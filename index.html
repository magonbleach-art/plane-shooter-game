<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际战机 3.1 - 弹幕进化正式版</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 400px; height: 600px; background: #050505; box-shadow: 0 0 50px rgba(0, 150, 255, 0.3); border: 2px solid rgba(0, 150, 255, 0.2); overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        h1 { color: #00d2ff; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .tutorial { color: #aaa; font-size: 0.8rem; line-height: 1.5; text-align: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .tutorial b { color: #00d2ff; }
        .feedback-area { width: 100%; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .feedback-input { background: rgba(255,255,255,0.1); border: 1px solid #3a7bd5; border-radius: 5px; color: #fff; padding: 8px; font-size: 0.8rem; outline: none; }
        button { width: 220px; height: 45px; margin: 5px 0; background: linear-gradient(135deg, #00d2ff, #3a7bd5); border: none; border-radius: 25px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }
        button:active { transform: scale(0.95); }
        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1rem; pointer-events: none; z-index: 50; }
        #boss-hp-bar { position: absolute; top: 40px; left: 50px; right: 50px; height: 8px; background: rgba(255,0,0,0.2); border: 1px solid #f00; display: none; z-index: 50; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.2s; box-shadow: 0 0 10px #f00; }
        #shake-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="shake-layer">
            <div id="hud">
                <div id="score">得分: 0</div>
                <div id="level-info">Level 1</div>
                <div id="life">❤️x3</div>
            </div>
            <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="start-screen" class="overlay">
            <h1>星际战机 3.1</h1>
            <div class="tutorial">
                <b>弹幕库 1.0 激活</b><br>
                • <b>扇形散弹</b>: 封锁走位，找间隙穿行<br>
                • <b>激光网格</b>: 交替扫描，躲避盲区<br>
                • <b>追踪弹雨</b>: 引导撞墙，切忌停顿<br>
                • <b>螺旋弹幕</b>: 视觉压力，中心安全<br>
                • <b>贯穿激光</b>: 致命蓄力，极限闪避
            </div>
            <button id="start-btn">挑战深空</button>
            <div class="feedback-area">
                <input type="text" id="feedback-input" class="feedback-input" placeholder="输入改进建议 (如: 削减Boss血量)">
                <button id="submit-feedback-btn" style="background: #222; font-size: 0.8rem; border: 1px solid #3a7bd5;">提交给 AI 专家团</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h1 style="color: #ff4b2b;">任务失败</h1>
            <p id="final-score">得分: 0</p>
            <button id="restart-btn">重新出发</button>
        </div>

        <div id="level-clear" class="overlay hidden">
            <h1 style="color: #00ff00;">关卡突破!</h1>
            <button id="next-level-btn">下一星域</button>
        </div>
    </div>

    <script>
        let gameConfig = {
            settings: { PLAYER_SPEED: 6, BULLET_SPEED: 14, ACTIVE_BULLET: "normal" },
            ui: { theme_color: "#00d2ff", shake_intensity: 8 },
            danmaku_library: [], bullet_types: [], levels: [], powerups: { types: [] }
        };

        async function loadConfig() {
            try {
                const response = await fetch('game_config.json?t=' + Date.now());
                if (response.ok) {
                    const newConfig = await response.json();
                    gameConfig = { ...gameConfig, ...newConfig };
                }
            } catch(e) { console.warn("Fallback to defaults"); }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        const shakeLayer = document.getElementById('shake-layer');
        canvas.width = 400; canvas.height = 600;

        let score = 0, lives = 3, gameActive = false, frameCount = 0;
        let player = { x: 200, y: 520, size: 30, bulletType: "normal", targetX: 200 };
        let playerBullets = [], enemyBullets = [], enemies = [], powerups = [], stars = [], boss = null, particles = [];
        let shakeTime = 0;

        for(let i=0; i<60; i++) stars.push({ x: Math.random()*400, y: Math.random()*600, s: Math.random()*2+1, speed: Math.random()*2+2 });

        container.addEventListener('touchmove', e => { player.targetX = e.touches[0].clientX - container.getBoundingClientRect().left; e.preventDefault(); }, { passive: false });
        container.addEventListener('mousemove', e => { player.targetX = e.clientX - container.getBoundingClientRect().left; });

        function triggerShake() { shakeTime = 15; }
        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
        }

        class Bullet {
            constructor(x, y, angle, typeId, speed, isEnemy = false) {
                this.x = x; this.y = y; this.angle = angle * Math.PI / 180;
                this.type = gameConfig.bullet_types.find(t => t.id === typeId) || { color: "#fff", width: 4, height: 10 };
                this.speed = speed || (isEnemy ? 4 : gameConfig.settings.BULLET_SPEED);
                this.isEnemy = isEnemy;
                this.isHoming = false;
            }
            update() {
                if (this.isHoming && this.isEnemy) {
                    let dx = player.x - this.x, dy = player.y - this.y;
                    let targetAngle = Math.atan2(dy, dx) + Math.PI/2;
                    let diff = targetAngle - this.angle;
                    // 使用更安全的角度归一化，防止死循环
                    while(diff > Math.PI) diff -= Math.PI*2;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    this.angle += diff * 0.02;
                }
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * (this.isEnemy ? -this.speed : this.speed);
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.isEnemy ? "#ff4b2b" : this.type.color;
                ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                if (this.type.id === "laser" && !this.isEnemy) ctx.fillRect(-this.type.width/2, -600, this.type.width, 600);
                else ctx.fillRect(-2, 0, 4, 10);
                ctx.restore();
            }
        }

        class Enemy {
            constructor(type = "normal") {
                this.x = Math.random() * 340 + 30; this.y = -60; this.type = type;
                this.hp = (type === "destroyer") ? 3 : 1; // 下调精英怪血量 (5 -> 3)
                this.speed = (type === "scout") ? 4 : 2;
            }
            update() { 
                this.y += this.speed; 
                // 修复：敌机子弹向下发射 (180度)
                if (frameCount % 80 === 0) enemyBullets.push(new Bullet(this.x, this.y, 180, "normal", 3, true)); 
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = (this.type === "destroyer") ? "#ff00ff" : "#ff4b2b";
                ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-15, -15); ctx.lineTo(15, -15); ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }

        class Boss {
            constructor(cfg) {
                this.cfg = cfg; this.hp = cfg.hp; this.maxHp = cfg.hp;
                this.x = 200; this.y = -100; this.targetY = 120;
                this.phase = 0; this.spiralAngle = 0;
            }
            update() {
                if (this.y < this.targetY) this.y += 1;
                else this.x += Math.sin(frameCount * 0.02) * 2;

                // 修复逻辑漏洞：按血量阈值倒序查找当前阶段
                const p = [...this.cfg.phases].reverse().find(ph => this.hp <= this.maxHp * ph.hp_threshold) || this.cfg.phases[0];
                p.patterns.forEach(pid => this.firePattern(pid));
            }
            firePattern(pid) {
                if (pid === "fan_spread" && frameCount % 60 === 0) {
                    // 修复：Boss 位于上方，子弹应向下发射 (180度)
                    for(let i=-4; i<=4; i++) enemyBullets.push(new Bullet(this.x, this.y + 40, 180 + i*15, "normal", 3, true));
                }
                if (pid === "homing_rain" && frameCount % 120 === 0) {
                    // 追踪弹初始方向设为向下
                    let b = new Bullet(this.x, this.y, 180, "normal", 2, true); b.isHoming = true; enemyBullets.push(b);
                }
                if (pid === "spiral_vortex") {
                    this.spiralAngle += 10;
                    if (frameCount % 5 === 0) {
                        for(let a=0; a<360; a+=90) enemyBullets.push(new Bullet(this.x, this.y, this.spiralAngle + a, "normal", 3, true));
                    }
                }
                if (pid === "laser_grid" && frameCount % 100 === 0) {
                    for(let i=0; i<3; i++) {
                        let b = new Bullet(50 + i*150, -50, 180, "normal", 5, true);
                        b.type = { color: "#ff00ff", width: 5, height: 800 };
                        enemyBullets.push(b);
                    }
                }
                if (pid === "mega_pierce" && frameCount % 200 === 0) {
                    triggerShake(); 
                    setTimeout(() => {
                        // 蓄力贯穿弹，向下发射
                        for(let i=0; i<10; i++) enemyBullets.push(new Bullet(this.x, this.y, 180, "normal", 15, true));
                    }, 1000);
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = "#333"; ctx.shadowBlur = 40; ctx.shadowColor = "#f00";
                ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(-60, 0); ctx.lineTo(60, 0); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            if (shakeTime > 0) {
                let s = gameConfig.ui.shake_intensity;
                shakeLayer.style.transform = `translate(${(Math.random()-0.5)*s}px, ${(Math.random()-0.5)*s}px)`;
                shakeTime--;
            } else shakeLayer.style.transform = "translate(0,0)";

            // 背景
            ctx.fillStyle = "#fff";
            stars.forEach(s => { s.y += s.speed; if(s.y > 600) s.y = -10; ctx.fillRect(s.x, s.y, s.s, s.s); });

            // 玩家
            player.x += (player.targetX - player.x) * 0.2;
            drawPlayer();

            // 射击
            if (frameCount % 10 === 0) {
                const bt = player.bulletType;
                if (bt === "spread") { for(let i=-2; i<=2; i++) playerBullets.push(new Bullet(player.x, player.y, i*20, "spread", 14)); }
                else playerBullets.push(new Bullet(player.x, player.y, 0, bt, 14));
            }

            // 子弹逻辑
            [playerBullets, enemyBullets].forEach((group, idx) => {
                const isEnemyGrp = idx === 1;
                for(let i=group.length-1; i>=0; i--) {
                    const b = group[i]; b.update(); b.draw();
                    if (isEnemyGrp) {
                        if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) { group.splice(i, 1); lives--; triggerShake(); updateLife(); }
                    } else {
                        enemies.forEach((e, ei) => {
                            if (Math.abs(b.x - e.x) < 30 && Math.abs(b.y - e.y) < 30) {
                                e.hp--; if(b.type.id !== "laser") group.splice(i, 1);
                if(e.hp <= 0) { 
                                    createExplosion(e.x, e.y, "#f44"); 
                                    score += 20; 
                                    enemies.splice(ei, 1); 
                                    if(Math.random() < 0.3) {
                                        // 修复：确保随机掉落所有类型的道具
                                        const pTypes = gameConfig.powerups.types;
                                        const randomType = pTypes[Math.floor(Math.random() * pTypes.length)];
                                        powerups.push({ x: e.x, y: e.y, info: randomType });
                                    }
                                }
                            }
                        });
                        if (boss && Math.abs(b.x - boss.x) < 60 && Math.abs(b.y - boss.y) < 50) {
                            boss.hp--; if(b.type.id !== "laser") group.splice(i, 1);
                            if(boss.hp <= 0) { score += 1000; boss = null; document.getElementById('boss-hp-bar').style.display="none"; gameActive = false; document.getElementById('level-clear').classList.remove('hidden'); }
                        }
                    }
                    if (b && (b.y < -600 || b.y > 1200)) group.splice(i, 1);
                }
            });

            // 敌人 & Boss
            enemies.forEach((e, i) => { e.update(); e.draw(); if(Math.abs(e.x-player.x)<30 && Math.abs(e.y-player.y)<30) { enemies.splice(i, 1); lives--; triggerShake(); updateLife(); } if(e.y>650) enemies.splice(i, 1); });
            if (boss) { boss.update(); boss.draw(); document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.maxHp*100) + "%"; }

            // 波次
            const lvl = gameConfig.levels[0];
            lvl.waves.forEach(w => { if(frameCount === w.time*60) { for(let i=0; i<w.count; i++) setTimeout(() => enemies.push(new Enemy(w.enemies[0])), i*600); } });
            if (frameCount === 40 * 60 && !boss) { boss = new Boss(lvl.boss); document.getElementById('boss-hp-bar').style.display="block"; }

            // 道具
            for(let i=powerups.length-1; i>=0; i--) {
                const p = powerups[i]; p.y += 2;
                ctx.save(); ctx.translate(p.x, p.y);
                
                // 绘制带发光边框的容器
                ctx.fillStyle = p.info.color; ctx.shadowBlur = 15; ctx.shadowColor = p.info.color;
                ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
                
                // 绘制类型图案 (图标化)
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath();
                if (p.info.target === "spread") {
                    // 扇形图标
                    ctx.moveTo(-8, 5); ctx.lineTo(0, -8); ctx.lineTo(8, 5);
                    ctx.moveTo(-5, 5); ctx.lineTo(0, -8); ctx.lineTo(5, 5);
                } else if (p.info.target === "laser") {
                    // 闪电/激光图标
                    ctx.moveTo(0, -10); ctx.lineTo(-5, 0); ctx.lineTo(5, 0); ctx.lineTo(0, 10);
                } else {
                    // 爱心图标 (HP)
                    ctx.moveTo(0, 5); ctx.bezierCurveTo(-10, -5, -10, -15, 0, -5); ctx.bezierCurveTo(10, -15, 10, -5, 0, 5);
                }
                ctx.stroke(); ctx.restore();

                if(Math.abs(p.x-player.x)<30 && Math.abs(p.y-player.y)<30) { 
                    if(p.info.target==="life") { lives=Math.min(3, lives+1); updateLife(); } 
                    else { player.bulletType = p.info.target; setTimeout(()=>player.bulletType="normal", 8000); } 
                    powerups.splice(i, 1); 
                }
            }

            // 粒子
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            if (lives <= 0) { gameActive = false; document.getElementById('game-over').classList.remove('hidden'); }
            document.getElementById('score').innerText = `得分: ${score}`;
            requestAnimationFrame(gameLoop);
        }

        function drawPlayer() {
            ctx.save(); ctx.translate(player.x, player.y);
            let color = "#00d2ff";
            if (player.bulletType === "spread") color = "#ffaa00";
            if (player.bulletType === "laser") color = "#00ffaa";
            
            ctx.shadowBlur = 25; ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            // 绘制主核心机身
            ctx.beginPath();
            ctx.moveTo(0, -35); ctx.lineTo(-15, 10); ctx.lineTo(15, 10);
            ctx.closePath(); ctx.fill();

            // 绘制侧翼机翼 (根据弹药类型变形)
            ctx.beginPath();
            if (player.bulletType === "spread") { 
                // 宽大展开形态
                ctx.moveTo(-15, 0); ctx.lineTo(-45, 25); ctx.lineTo(-15, 15);
                ctx.moveTo(15, 0); ctx.lineTo(45, 25); ctx.lineTo(15, 15);
            } else if (player.bulletType === "laser") {
                // 尖锐聚焦形态
                ctx.moveTo(-15, -10); ctx.lineTo(-25, 20); ctx.lineTo(-10, 10);
                ctx.moveTo(15, -10); ctx.lineTo(25, 20); ctx.lineTo(10, 10);
            } else {
                // 默认平衡形态
                ctx.moveTo(-15, 5); ctx.lineTo(-30, 20); ctx.lineTo(-15, 15);
                ctx.moveTo(15, 5); ctx.lineTo(30, 20); ctx.lineTo(15, 15);
            }
            ctx.fill();

            // 绘制机身金属细节
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1;
            ctx.stroke();

            // 绘制驾驶舱 (带玻璃光感)
            let cockpitGrad = ctx.createLinearGradient(0, -15, 0, 5);
            cockpitGrad.addColorStop(0, "#fff"); cockpitGrad.addColorStop(1, "#666");
            ctx.fillStyle = cockpitGrad;
            ctx.beginPath(); ctx.ellipse(0, -5, 6, 12, 0, 0, Math.PI*2); ctx.fill();
            
            // 引擎喷火效果 (增加粒子感)
            ctx.fillStyle = (frameCount % 4 < 2) ? "#ff4b2b" : "#ffaa00";
            ctx.fillRect(-8, 15, 16, 12 + Math.random()*15);
            ctx.restore();
        }

        function updateLife() { document.getElementById('life').innerText = `❤️x${lives}`; }
        function startGame() {
            loadConfig().then(() => {
                gameActive = true; score = 0; lives = 3; frameCount = 0;
                playerBullets = []; enemyBullets = []; enemies = []; powerups = []; boss = null; particles = [];
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('level-clear').classList.add('hidden');
                updateLife(); gameLoop();
            });
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;
        document.getElementById('next-level-btn').onclick = () => location.reload();

        document.getElementById('submit-feedback-btn').onclick = async () => {
            const input = document.getElementById('feedback-input');
            const suggest = input.value.trim();
            if (!suggest) return alert("请输入改进建议后再提交哦！");
            
            try {
                const topic = "trae_plane_shooter_jibin_2026";
                const response = await fetch(`https://ntfy.sh/${topic}`, {
                    method: 'POST',
                    body: JSON.stringify({ suggest: suggest, timestamp: Date.now() })
                });
                if (response.ok) {
                    alert("✅ 建议已发送！AI 专家团正在评审，请稍后刷新游戏查看变化。");
                    input.value = "";
                }
            } catch (e) { alert("发送失败，请检查网络。"); }
        };
    </script>
</body>
</html>
