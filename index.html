<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生肖射手：十二星座秘境</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 400px; height: 600px; background: #050505; box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        h1 { color: #ffd700; font-size: 2rem; margin-bottom: 10px; text-align: center; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .tutorial { color: #aaa; font-size: 0.8rem; line-height: 1.5; text-align: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        .tutorial b { color: #ffd700; }
        button { width: 220px; height: 45px; margin: 5px 0; background: linear-gradient(135deg, #ffd700, #b8860b); border: none; border-radius: 25px; color: #000; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 0.9rem; pointer-events: none; z-index: 50; color: #ffd700; }
        #boss-info { position: absolute; top: 40px; left: 50px; right: 50px; text-align: center; z-index: 50; }
        #boss-countdown { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        #boss-hp-bar { height: 6px; background: rgba(255,0,0,0.2); border: 1px solid #f00; display: none; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.2s; box-shadow: 0 0 10px #f00; }
        #bullet-selector { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 50; }
        .bullet-icon { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #444; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .bullet-icon.active { border-color: #ffd700; box-shadow: 0 0 15px #ffd700; transform: scale(1.1); }
        .feedback-area { width: 100%; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .feedback-input { background: rgba(255,255,255,0.1); border: 1px solid #ffd700; border-radius: 5px; color: #fff; padding: 8px; font-size: 0.8rem; outline: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div id="score">得分: 0</div>
            <div id="level-name">白羊宫</div>
            <div id="life">❤️x3</div>
        </div>
        <div id="boss-info">
            <div id="boss-countdown">Boss 降临倒计时: 30s</div>
            <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="bullet-selector"></div>

        <div id="start-screen" class="overlay">
            <h1>生肖射手<br>十二星座秘境</h1>
            <div class="tutorial">
                <b>秘境法则</b><br>
                1. 挑战<b>十二星座</b>关卡，解锁<b>十二生肖</b>子弹<br>
                2. <b>鼠子弹 (白羊宫解锁)</b>: 高速、穿透<br>
                3. 点击底部图标切换子弹机制
            </div>
            <button id="start-btn">开启秘境</button>
            <div class="feedback-area">
                <input type="text" id="feedback-input" class="feedback-input" placeholder="输入进化建议 (如: 增加子弹特效)">
                <button id="submit-feedback-btn" style="background: #222; color: #ffd700; border: 1px solid #ffd700; font-size: 0.8rem;">提交给 AI 专家团</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h1 style="color: #ff4b2b;">灵力枯竭</h1>
            <button id="restart-btn">再次挑战</button>
        </div>

        <div id="level-clear" class="overlay hidden">
            <h1 style="color: #00ff00;">宫殿净化成功!</h1>
            <p id="unlock-msg">解锁新子弹: 鼠</p>
            <button id="next-level-btn">进入下一宫</button>
        </div>
    </div>

    <script>
        let gameConfig = { settings: {}, zodiac_bullets: [], constellation_levels: [] };
        async function loadConfig() {
            const res = await fetch('game_config.json?t=' + Date.now());
            gameConfig = await res.json();
            renderBulletSelector();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        let gameActive = false, score = 0, lives = 3, frameCount = 0;
        let currentLevelIdx = 0, activeBulletId = 'rat';
        let player = { x: 200, y: 520, targetX: 200 };
        let bullets = [], enemies = [], stars = [], particles = [], powerups = [], boss = null;
        let bossSpawnTime = 1800; // 30秒 (60帧/秒)

        for(let i=0; i<50; i++) stars.push({ x: Math.random()*400, y: Math.random()*600, s: Math.random()*2+1 });

        window.addEventListener('mousemove', e => player.targetX = e.clientX - canvas.getBoundingClientRect().left);
        window.addEventListener('touchmove', e => { player.targetX = e.touches[0].clientX - canvas.getBoundingClientRect().left; e.preventDefault(); }, {passive:false});

        function renderBulletSelector() {
            const container = document.getElementById('bullet-selector');
            container.innerHTML = '';
            // 显示已解锁的子弹
            const unlocked = gameConfig.constellation_levels.slice(0, currentLevelIdx + 1).map(l => l.unlock_bullet);
            gameConfig.zodiac_bullets.filter(b => unlocked.includes(b.id)).forEach(b => {
                const div = document.createElement('div');
                div.className = `bullet-icon ${activeBulletId === b.id ? 'active' : ''}`;
                div.innerText = b.name;
                div.onclick = () => { activeBulletId = b.id; renderBulletSelector(); };
                container.appendChild(div);
            });
        }

        class Bullet {
            constructor(x, y, cfg, isEnemy = false) {
                this.x = x; this.y = y; this.cfg = cfg;
                this.isEnemy = isEnemy;
                this.speed = (isEnemy ? 4 : gameConfig.settings.BULLET_SPEED) * (cfg.speed_mult || 1);
            }
            update() { this.y += this.isEnemy ? this.speed : -this.speed; }
            draw() {
                ctx.save(); ctx.fillStyle = this.isEnemy ? "#ff4b2b" : this.cfg.color; ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        class PowerUp {
            constructor(x, y) {
                const types = [
                    { id: 'hp', color: '#ff4b2b', label: '❤️' },
                    { id: 'rat', color: '#e0e0e0', label: '鼠' },
                    { id: 'ox', color: '#8d6e63', label: '牛' }
                ];
                this.info = types[Math.floor(Math.random() * types.length)];
                this.x = x; this.y = y; this.speed = 2;
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.save(); ctx.fillStyle = this.info.color; ctx.shadowBlur = 15; ctx.shadowColor = this.info.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.info.label, this.x, this.y + 5); ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random()*360 + 20; this.y = -30; this.speed = 2;
            }
            update() { 
                this.y += this.speed; 
                if (frameCount % 100 === 0) bullets.push(new Bullet(this.x, this.y, { color: "#ff4b2b" }, true));
            }
            draw() {
                ctx.save(); ctx.fillStyle = "#ff4b2b"; ctx.beginPath();
                ctx.moveTo(this.x, this.y + 15); ctx.lineTo(this.x - 15, this.y - 15); ctx.lineTo(this.x + 15, this.y - 15);
                ctx.closePath(); ctx.fill(); ctx.restore();
            }
        }

        class Boss {
            constructor(cfg) {
                this.cfg = cfg; this.hp = cfg.hp; this.maxHp = cfg.hp;
                this.x = 200; this.y = -100; this.targetY = 120;
            }
            update() {
                if (this.y < this.targetY) this.y += 1;
                else this.x += Math.sin(frameCount * 0.02) * 2;
                
                if (frameCount % 60 === 0) {
                    for(let i=-2; i<=2; i++) bullets.push(new Bullet(this.x + i*20, this.y + 40, { color: "#ff4b2b" }, true));
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = "#333"; ctx.shadowBlur = 40; ctx.shadowColor = "#f00";
                ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(-60, 0); ctx.lineTo(60, 0); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, 400, 600); frameCount++;

            // 背景
            ctx.fillStyle = '#fff';
            stars.forEach(s => { s.y += 2; if(s.y > 600) s.y = -10; ctx.fillRect(s.x, s.y, s.s, s.s); });

            // 玩家
            player.x += (player.targetX - player.x) * 0.2;
            ctx.fillStyle = "#ffd700"; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 25); ctx.lineTo(player.x - 20, player.y + 10); ctx.lineTo(player.x + 20, player.y + 10);
            ctx.closePath(); ctx.fill();

            // Boss 逻辑
            const levelCfg = gameConfig.constellation_levels[currentLevelIdx];
            if (!boss && frameCount < bossSpawnTime) {
                let timeLeft = Math.max(0, Math.ceil((bossSpawnTime - frameCount) / 60));
                document.getElementById('boss-countdown').innerText = `Boss 降临倒计时: ${timeLeft}s`;
            } else if (!boss && frameCount >= bossSpawnTime) {
                boss = new Boss(levelCfg.boss);
                document.getElementById('boss-countdown').innerText = "WARNING: BOSS 出现!";
                document.getElementById('boss-hp-bar').style.display = "block";
            }

            if (boss) {
                boss.update(); boss.draw();
                document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
            }

            // 发射
            if (frameCount % 10 === 0) {
                const bCfg = gameConfig.zodiac_bullets.find(b => b.id === activeBulletId);
                bullets.push(new Bullet(player.x, player.y - 20, bCfg));
            }

            // 子弹逻辑
            for(let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.update(); b.draw();
                if (b.isEnemy) {
                    if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
                        bullets.splice(i, 1); lives--; updateHUD();
                        if (lives <= 0) endGame();
                    }
                } else {
                    enemies.forEach((e, ei) => {
                        if (Math.abs(b.x - e.x) < 25 && Math.abs(b.y - e.y) < 25) {
                            enemies.splice(ei, 1); score += 10; updateHUD();
                            if (Math.random() < 0.2) powerups.push(new PowerUp(e.x, e.y));
                            if (!b.cfg.pierce) bullets.splice(i, 1);
                        }
                    });
                    if (boss && Math.abs(b.x - boss.x) < 60 && Math.abs(b.y - boss.y) < 40) {
                        boss.hp--; if (!b.cfg.pierce) bullets.splice(i, 1);
                        if (boss.hp <= 0) {
                            score += 1000; boss = null;
                            document.getElementById('boss-hp-bar').style.display = "none";
                            levelClear();
                        }
                    }
                }
                if (b && (b.y < -50 || b.y > 650)) bullets.splice(i, 1);
            }

            // 敌人逻辑
            if (frameCount % 60 === 0 && !boss) enemies.push(new Enemy());
            for(let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i]; e.update(); e.draw();
                if (Math.abs(e.x - player.x) < 30 && Math.abs(e.y - player.y) < 30) {
                    enemies.splice(i, 1); lives--; updateHUD();
                    if (lives <= 0) endGame();
                }
                if (e.y > 650) enemies.splice(i, 1);
            }

            // 道具逻辑
            for(let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i]; p.update(); p.draw();
                if (Math.abs(p.x - player.x) < 30 && Math.abs(p.y - player.y) < 30) {
                    if (p.info.id === 'hp') { lives = Math.min(3, lives + 1); updateHUD(); }
                    else { activeBulletId = p.info.id; renderBulletSelector(); }
                    powerups.splice(i, 1);
                }
                if (p.y > 650) powerups.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score').innerText = `得分: ${score}`;
            document.getElementById('life').innerText = `❤️x${lives}`;
        }

        function startGame() {
            loadConfig().then(() => {
                gameActive = true; score = 0; lives = 3; frameCount = 0;
                bullets = []; enemies = []; powerups = []; boss = null;
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('level-clear').classList.add('hidden');
                document.getElementById('boss-hp-bar').style.display = "none";
                updateHUD(); gameLoop();
            });
        }

        function levelClear() {
            gameActive = false;
            document.getElementById('level-clear').classList.remove('hidden');
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;
        document.getElementById('next-level-btn').onclick = () => location.reload();
        document.getElementById('submit-feedback-btn').onclick = async () => {
            const val = document.getElementById('feedback-input').value;
            if(!val) return;
            await fetch('https://ntfy.sh/trae_plane_shooter_jibin_2026', { method: 'POST', body: JSON.stringify({ suggest: val }) });
            alert("建议已提交给 AI 专家团！");
        };
    </script>
</body>
</html>
