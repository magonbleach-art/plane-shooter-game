<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生肖射手：十二星座秘境</title>
    <script src="zodiac_designs.js?v=7.8"></script>
    <style>
        :root {
            --primary: #ffd700;
            --accent: #00ffff;
            --bg-dark: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 215, 0, 0.15);
            --neon-glow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        body { margin: 0; padding: 0; background: #050507; color: #e0e0e0; font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #game-container { 
            position: relative; width: 400px; height: 600px; background: var(--bg-dark); 
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; display: flex; 
            flex-direction: column; border-radius: 24px;
        }
        
        canvas { display: block; width: 400px; height: 600px; cursor: crosshair; filter: saturate(1.1); }
        
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(15, 15, 20, 0.95), rgba(5, 5, 7, 0.98));
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; padding: 20px; box-sizing: border-box; backdrop-filter: blur(25px); 
        }
        
        .hidden { display: none !important; }
        
        .ui-panel { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .ui-section { 
            width: 100%; max-width: 340px; background: var(--glass); 
            border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 15px; box-sizing: border-box; backdrop-filter: blur(10px);
        }

        .btn-group { width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 12px; }
        button { 
            width: 100%; height: 52px; border-radius: 16px; font-weight: 800; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: none; font-size: 1rem;
            position: relative; overflow: hidden;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: scale(0.96); }

        #start-btn { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3); }
        #show-select-btn { background: #fff; color: #000; }
        #show-settings-btn { background: #444; color: var(--primary); border: 1px solid var(--glass-border); }
        .secondary-btn { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .setting-btn { 
            height: 40px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa; border-radius: 10px; cursor: pointer; margin-bottom: 5px;
        }
        .setting-btn.active { background: var(--primary); color: #000; border-color: #fff; font-weight: bold; }

        #hud { 
            position: absolute; top: 20px; left: 20px; right: 20px; display: flex; 
            justify-content: space-between; font-size: 0.85rem; pointer-events: none; 
            z-index: 50; color: #fff; font-weight: 800;
        }
        #hud div { background: rgba(0, 0, 0, 0.4); padding: 5px 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #boss-hp-bar { 
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; 
            display: none; z-index: 50;
        }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; border-radius: 4px; box-shadow: 0 0 10px #f00; }

        #ultimate-bar {
            position: absolute; bottom: 50px; left: 20px; right: 20px; height: 12px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; overflow: hidden; z-index: 50; display: none;
        }
        #ultimate-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #00ffff, #ffd700);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ultimate-hint {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px; animation: pulse 1s infinite; display: none;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #loading-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }
        #loading-bar { width: 200px; height: 4px; background: #333; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        #loading-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }

        .feedback-box {
            width: 100%; max-width: 340px; margin-top: 10px;
            background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 15px; padding: 12px;
        }
        .feedback-input-group { display: flex; gap: 8px; margin-top: 8px; }
        #feedback-input { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px;
            color: #fff; padding: 8px; font-size: 0.8rem; outline: none;
        }
        #submit-feedback-btn { width: 80px; height: 36px; border-radius: 8px; background: #fff; color: #000; font-size: 0.8rem; }

        #debug-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30px;
            background: rgba(0,0,0,0.8); font-family: monospace; font-size: 10px;
            color: #0f0; padding: 8px; box-sizing: border-box; z-index: 200;
            border-top: 1px solid #333;
        }
        .status-ready { background: rgba(0, 255, 0, 0.9) !important; color: #000 !important; }

        .zodiac-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .zodiac-item { 
            aspect-ratio: 1/1; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .zodiac-item.selected { background: rgba(255, 215, 0, 0.15); border-color: var(--primary); }
        .zodiac-icon { font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 资源加载层 -->
        <div id="loading-screen" class="hidden">
            <h2 style="color:var(--primary); letter-spacing:4px;">灵力注入中...</h2>
            <div id="loading-bar"><div id="loading-fill"></div></div>
        </div>

        <div id="hud">
            <div id="score">得分: 0</div>
            <div id="level-name">准备中...</div>
            <div id="life">❤️x2</div>
        </div>
        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
        <div id="version-tag" style="position:absolute; top:10px; right:10px; background:linear-gradient(135deg, #f00, #b00); color:#fff; font-size:12px; padding:4px 12px; z-index:9999; border-radius:20px; font-weight:bold; box-shadow:0 0 20px rgba(255,0,0,0.6); border:2px solid #fff;">VER: 8.0.0-Zodiac-Evo</div>
        <div id="ultimate-bar">
            <div id="ultimate-hint">能量已满 - 点击屏幕释放大招</div>
            <div id="ultimate-fill"></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="debug-overlay">
            系统状态: 就绪 
            <button onclick="location.reload(true)" style="width:60px; height:20px; font-size:9px; background:#444; color:#fff; border:1px solid #666; margin-left:10px; cursor:pointer;">强制刷新</button>
        </div>

        <!-- 初始屏幕 -->
        <div id="start-screen" class="overlay">
            <div class="ui-panel">
                <h1 style="color:#fff; font-size:2.2rem; margin:0; letter-spacing:2px;">生肖射手</h1>
                <h3 style="color:rgba(255,255,255,0.6); margin:-10px 0 10px 0;">十二星座秘境</h3>
                
                <div class="ui-section">
                    <div style="font-size:0.85rem; line-height:1.8; color:var(--primary); margin-bottom:5px;">▎ 秘境法则</div>
                    <div style="font-size:0.8rem; line-height:1.6; color:#aaa;">
                        1. 挑战<b>十二星座</b>宫殿，净化黑暗之力<br>
                        2. 收集掉落的<b>生肖灵珠</b>切换子弹形态<br>
                        3. 击败最终 Boss 解锁下一关及新子弹
                    </div>
                </div>

                <div class="btn-group">
                    <button id="show-select-btn">选择生肖开局</button>
                    <button id="show-settings-btn">游戏设置</button>
                    <button id="start-btn">开启秘境</button>
                </div>

                <div class="feedback-box">
                    <div style="font-size:0.75rem; color:var(--primary);">▎ 进化建议</div>
                    <div class="feedback-input-group">
                        <input type="text" id="feedback-input" placeholder="由 AI 专家评审...">
                        <button id="submit-feedback-btn">提交</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 生肖选择界面 -->
        <div id="zodiac-select" class="overlay hidden">
            <div class="ui-panel">
                <h2>选择灵力形态</h2>
                <div class="ui-section">
                    <div id="zodiac-list" class="zodiac-grid"></div>
                </div>
                <div class="btn-group">
                    <button id="confirm-select-btn" style="background:var(--primary); color:#000;">确认形态</button>
                    <button id="back-to-start-btn" class="secondary-btn">返回</button>
                </div>
            </div>
        </div>

        <!-- 设置界面 -->
        <div id="game-settings" class="overlay hidden">
            <div class="ui-panel" style="overflow-y:auto; max-height:90vh; padding:10px;">
                <h2>实验室配置</h2>
                <div class="ui-section" style="border:1px solid var(--accent);">
                    <div style="margin-bottom:10px; font-size:0.8rem; color:var(--accent);">调试与验证</div>
                    <button id="automation-test-btn" style="background:rgba(0,255,255,0.1); color:var(--accent); border:1px solid var(--accent); height:40px; font-size:0.9rem;">🧪 启动自动化测试仿真</button>
                </div>
                <div class="ui-section">
                    <div style="margin-bottom:10px; font-size:0.8rem; color:var(--primary);">敌方强度</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                        <button class="setting-btn" data-type="diff" data-val="0.5">低</button>
                        <button class="setting-btn active" data-type="diff" data-val="1.0">中</button>
                        <button class="setting-btn" data-type="diff" data-val="2.0">高</button>
                    </div>
                </div>
                <div class="ui-section">
                    <div style="margin-bottom:10px; font-size:0.8rem; color:var(--primary);">模拟速度</div>
                    <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;">
                        <button class="setting-btn" data-type="speed" data-val="0.6">1档</button>
                        <button class="setting-btn" data-type="speed" data-val="0.8">2档</button>
                        <button class="setting-btn active" data-type="speed" data-val="1.0">3档</button>
                        <button class="setting-btn" data-type="speed" data-val="1.2">4档</button>
                        <button class="setting-btn" data-type="speed" data-val="1.5">5档</button>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="save-settings-btn" style="background:var(--primary); color:#000;">保存并返回</button>
                </div>
            </div>
        </div>

        <!-- 游戏结束 -->
        <div id="game-over" class="overlay hidden">
            <div class="ui-panel">
                <h1 style="color:#f44336;">灵力散尽</h1>
                <div id="final-score-display" style="font-size:1.5rem; color:var(--primary);">得分: 0</div>
                <div class="btn-group">
                    <button id="restart-btn">重聚灵力</button>
                    <button onclick="location.reload()" class="secondary-btn">回到原点</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("%c OpenClaw v7.9.9 Loaded %c", "background:#f00; color:#fff; font-weight:bold;", "");
        
        const State = {
            gameActive: false, score: 0, lives: 3, frameCount: 0,
            startTime: 0, weapon: 'rat', bulletLevel: 1, wingmen: [], powerups: [],
            ultimateEnergy: 0, maxUltimateEnergy: 100, isUltimateActive: false,
            level: 0, diff: 1.0, speed: 1.0,
            stars: [], bullets: [], enemies: [], boss: null, particles: [],
            playerX: 200, playerTargetX: 200, playerHitFlash: 0,
            unlockedZodiacs: ['rat'],
            assets: {}
        };

        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                State.particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        const AssetManager = {
            queue: [], total: 0, loaded: 0,
            add(id, src) { this.queue.push({id, src}); this.total++; },
            async loadAll() {
                if (this.total === 0) return;
                document.getElementById('loading-screen').classList.remove('hidden');
                const timeout = new Promise(resolve => setTimeout(resolve, 5000));
                const loadAssets = async () => {
                    // 并行加载资源以提高速度
                    const loadPromises = this.queue.map(item => {
                        return new Promise(resolve => {
                            try {
                                const img = new Image();
                                img.onload = () => {
                                    State.assets[item.id] = img;
                                    this.loaded++;
                                    document.getElementById('loading-fill').style.width = (this.loaded / this.total * 100) + "%";
                                    resolve();
                                };
                                img.onerror = () => {
                                    // 资源加载失败时使用默认绘制
                                    console.log(`Resource ${item.src} failed to load, using fallback`);
                                    this.loaded++;
                                    document.getElementById('loading-fill').style.width = (this.loaded / this.total * 100) + "%";
                                    resolve();
                                };
                                img.src = item.src + "?v=" + Date.now();
                            } catch(e) {
                                console.error(`Error loading ${item.src}:`, e);
                                this.loaded++;
                                document.getElementById('loading-fill').style.width = (this.loaded / this.total * 100) + "%";
                                resolve();
                            }
                        });
                    });
                    await Promise.all(loadPromises);
                };
                await Promise.race([loadAssets(), timeout]);
                setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 500);
            }
        };

        let Config = { constellation_levels: [], zodiac_bullets: [] };
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        function log(msg) {
            const el = document.getElementById('debug-overlay');
            if (el) {
                const now = new Date().toLocaleTimeString();
                el.innerHTML = `<span style="color:#ffd700">[${now}]</span> 系统状态: ${msg} 
                <button onclick="location.reload(true)" style="width:60px; height:20px; font-size:9px; background:#444; color:#fff; border:1px solid #666; margin-left:10px; cursor:pointer;">强制刷新</button>`;
                el.classList.add('status-ready');
            }
        }

        function bind(id, callback) {
            const el = document.getElementById(id);
            if (!el) return;
            const newBtn = el.cloneNode(true);
            el.parentNode.replaceChild(newBtn, el);
            newBtn.addEventListener('click', callback);
        }

        function showScreen(id) {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(id);
            if (target) target.classList.remove('hidden');
        }

        function safeDrawImage(img, x, y, w, h) {
            if (img && img.complete && img.naturalWidth > 0) { ctx.drawImage(img, x, y, w, h); return true; }
            return false;
        }

        class Bullet {
            constructor(x, y, cfg, angle, isEnemy) {
                this.x = x; this.y = y; this.cfg = cfg; this.isEnemy = isEnemy;
                this.angle = angle * Math.PI / 180;
                this.baseSpeed = (isEnemy ? 4 : 12) * State.speed;
                this.speed = this.baseSpeed;
                this.frameCount = 0;
                this.target = null;
                this.isDead = false;
                this.pierceCount = 0;
                this.isSplit = false;
                this.lifeTime = 0;
                this.maxLifeTime = 120;
            }
            update() {
                this.frameCount++;
                this.lifeTime++;
                if (!this.isEnemy) {
                    const id = this.cfg.id;
                    // --- 12生肖双特性逻辑核心实现 ---
                    switch(id) {
                        case 'rat': // 特性1：拦截(在碰撞逻辑处理) | 特性2：分裂
                            if (!this.isSplit && this.lifeTime === 30) {
                                for(let i=-1; i<=1; i+=2) {
                                    let b = new Bullet(this.x, this.y, this.cfg, (this.angle*180/Math.PI) + i*20, false);
                                    b.isSplit = true; b.speed = this.speed * 1.2; State.bullets.push(b);
                                }
                                this.isDead = true;
                            }
                            break;
                        case 'ox': // 特性1：击退(碰撞逻辑) | 特性2：重型慢速
                            this.speed = this.baseSpeed * 0.7;
                            break;
                        case 'tiger': // 特性1：体型增长 | 特性2：威力随距离增加
                            this.speed = this.baseSpeed * 1.1;
                            break;
                        case 'rabbit': // 特性1：反弹 | 特性2：灵活穿透
                            if (this.x < 10 || this.x > 390) { this.angle = Math.PI - this.angle; this.speed *= 1.1; }
                            break;
                        case 'dragon': // 特性1：极速 | 特性2：贯穿龙息(不消失)
                            this.speed = this.baseSpeed * 1.8;
                            break;
                        case 'snake': // 特性1：蛇形走位 | 特性2：剧毒标记(碰撞逻辑)
                            this.x += Math.sin(this.frameCount * 0.15) * 12;
                            break;
                        case 'horse': // 特性1：持续加速 | 特性2：冲锋陷阵
                            this.speed += 0.2;
                            break;
                        case 'goat': // 特性1：治疗反馈 | 特性2：神圣力场(范围减速)
                            State.enemies.forEach(e => {
                                if (Math.hypot(this.x - e.x, this.y - e.y) < 60) e.speed *= 0.95;
                            });
                            break;
                        case 'monkey': // 特性1：幻影分身 | 特性2：随机暴击
                            if (this.frameCount % 20 === 0) {
                                let shadow = new Bullet(this.x, this.y, this.cfg, (this.angle*180/Math.PI), false);
                                shadow.isDead = true; shadow.isShadow = true; State.bullets.push(shadow);
                            }
                            break;
                        case 'rooster': // 特性1：扇形散弹 | 特性2：高频连发
                            this.speed = this.baseSpeed * 1.3;
                            break;
                        case 'dog': // 特性1：精准追踪 | 特性2：锁定加速
                            if (!this.target || this.target.hp <= 0) {
                                let minDist = 800;
                                [...State.enemies, State.boss].filter(e => e && e.hp > 0).forEach(e => {
                                    let d = Math.hypot(e.x - this.x, e.y - this.y);
                                    if (d < minDist) { minDist = d; this.target = e; }
                                });
                            }
                            if (this.target) {
                                let targetAngle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                                let diff = targetAngle - this.angle;
                                while (diff < -Math.PI) diff += Math.PI * 2;
                                while (diff > Math.PI) diff -= Math.PI * 2;
                                this.angle += diff * 0.12;
                                this.speed += 0.15;
                            }
                            break;
                        case 'pig': // 特性1：范围核爆 | 特性2：体型压制
                            this.speed = this.baseSpeed * 0.6;
                            break;
                    }
                }
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }
            draw() {
                if (this.isShadow) { ctx.globalAlpha = 0.3; }
                ctx.save(); ctx.translate(this.x, this.y);
                const assetId = `bullet_${this.cfg.id}`;
                // 优先使用 ZODIAC_DESIGNS 的矢量绘制以保证视觉差异化，如果不存在则使用贴图
                if (window.ZODIAC_DESIGNS && window.ZODIAC_DESIGNS[this.cfg.id]) {
                    window.ZODIAC_DESIGNS[this.cfg.id].attack_effect(ctx, this);
                } else if (!safeDrawImage(State.assets[assetId], -10, -10, 20, 20)) {
                    ctx.fillStyle = this.isEnemy ? "#f44336" : (this.cfg.color || "#fff");
                    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
                ctx.globalAlpha = 1.0;
            }
        }

        class Enemy {
            constructor(type) {
                this.type = type; this.isDead = false; this.hitFlash = 0;
                this.x = Math.random() * 360 + 20; this.y = -50;
                const cfg = (Config.enemies || {})[type] || {hp:10, speed:2};
                this.hp = cfg.hp * State.diff; this.maxHp = this.hp;
                this.speed = cfg.speed * State.speed;
                this.frameCount = 0;
            }
            update() {
                this.frameCount++; this.y += this.speed;
                if (this.type === 'shooter' && this.frameCount % 100 === 0) {
                    State.bullets.push(new Bullet(this.x, this.y, {id:'enemy'}, 90, true));
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.hitFlash > 0) { this.hitFlash--; ctx.filter = "brightness(3)"; }
                
                // 渲染优先级：关卡特定图片 (enemy_L_T) -> 通用图片 (enemy_T) -> 几何占位
                const levelAssetId = `enemy_${State.level}_${this.type}`;
                const commonAssetId = `enemy_${this.type}`;
                
                let size = this.type === 'tank' ? 60 : (this.type === 'elite' ? 80 : 40);
                
                if (!safeDrawImage(State.assets[levelAssetId], -size/2, -size/2, size, size) &&
                    !safeDrawImage(State.assets[commonAssetId], -size/2, -size/2, size, size)) {
                    ctx.fillStyle = this.type === 'elite' ? "#9c27b0" : (this.type === 'tank' ? "#5d4037" : "#333");
                    ctx.beginPath(); ctx.moveTo(0, size/2); ctx.lineTo(-size/2, -size/2); ctx.lineTo(size/2, -size/2); ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            }
        }

        class Boss {
            constructor(cfg) {
                this.cfg = cfg; this.hp = (cfg.boss ? cfg.boss.hp : 500) * State.diff; this.maxHp = this.hp;
                this.x = 200; this.y = -100; this.ty = 120; this.phase = 1; this.maxPhases = 12; this.hitFlash = 0;
                this.nameMap = { "白羊宫": "aries", "金牛宫": "taurus", "双子宫": "gemini", "巨蟹宫": "cancer", "狮子宫": "leo", "处女宫": "virgo", "天秤宫": "libra", "天蝎宫": "scorpio", "射手宫": "sagittarius", "摩羯宫": "capricorn", "水瓶宫": "aquarius", "双鱼宫": "pisces" };
            }
            update() {
                if (this.y < this.ty) this.y += 2;
                this.x = 200 + Math.sin(State.frameCount * 0.02) * 100;
                if (this.hitFlash > 0) this.hitFlash--;
                const hpRatio = this.hp / this.maxHp;
                this.phase = Math.max(1, Math.min(this.maxPhases, Math.ceil((1 - hpRatio) * this.maxPhases) + 1));
                if (State.frameCount % 60 === 0) {
                    for(let i=0; i<360; i+=30) State.bullets.push(new Bullet(this.x, this.y, {id:'boss'}, i, true));
                }
            }
            draw() {
                const rawName = this.cfg.constellation || 'Aries';
                const engName = this.nameMap[rawName] || rawName.toLowerCase();
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.hitFlash > 0) ctx.filter = "brightness(3) grayscale(1)";
                
                const assetId = `boss_${engName}_phase${this.phase}`;
                const fallbackId = `boss_${engName}_phase1`;
                
                // 渲染优先级：当前阶段 PNG -> 第一阶段 PNG -> CONSTELLATION_DESIGNS 矢量绘制 -> 红色方块兜底
                if (!safeDrawImage(State.assets[assetId], -100, -100, 200, 200) && 
                    !safeDrawImage(State.assets[fallbackId], -100, -100, 200, 200)) {
                    
                    if (window.CONSTELLATION_DESIGNS && (window.CONSTELLATION_DESIGNS[rawName] || window.CONSTELLATION_DESIGNS[engName])) {
                        const design = window.CONSTELLATION_DESIGNS[rawName] || window.CONSTELLATION_DESIGNS[engName];
                        design.draw(ctx, this);
                    } else {
                        ctx.fillStyle="#f00"; ctx.fillRect(-30, -30, 60, 60);
                    }
                }
                ctx.restore();
            }
        }

        class Powerup {
            constructor(x, y, type, zodiacId = null) { this.x = x; this.y = y; this.type = type; this.zodiacId = zodiacId; this.speed = 1.5 * State.speed; }
            update() { this.y += this.speed; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                const assetId = `item_${this.type}`;
                if (!safeDrawImage(State.assets[assetId], -20, -20, 40, 40)) {
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Wingman {
            constructor(side) { this.side = side; }
            update() { this.x = State.playerX + this.side * 40; this.y = 520; }
            draw() { if (!safeDrawImage(State.assets['wingman'], this.x-15, this.y-15, 30, 30)) { ctx.fillStyle = "#444"; ctx.fillRect(this.x-10, this.y, 20, 20); } }
            shoot() {
                const bCfg = Config.zodiac_bullets.find(b => b.id === State.weapon) || {color:'#ffd700', id: State.weapon};
                State.bullets.push(new Bullet(this.x, this.y, bCfg, -90, false));
            }
        }

        async function load() {
            try {
                const r = await fetch('game_config.json?v=' + Date.now());
                Config = await r.json();
                
                // 基础资产
                AssetManager.add('player', 'assets/planes/hero.png');
                AssetManager.add('wingman', 'assets/planes/wingman.png');
                AssetManager.add('bullet_enemy', 'assets/bullets/bullet_enemy.png');
                AssetManager.add('bullet_boss', 'assets/bullets/bullet_boss.png');
                
                // 关卡特定小怪图片 (支持 12 关 x 4 种类型)
                const enemyTypes = ['scout', 'shooter', 'tank', 'elite'];
                for (let l = 0; l < 12; l++) {
                    enemyTypes.forEach(t => {
                        AssetManager.add(`enemy_${l}_${t}`, `assets/planes/enemy_${l}_${t}.png`);
                    });
                }
                // 通用小怪图片 (兜底)
                enemyTypes.forEach(t => AssetManager.add(`enemy_${t}`, `assets/planes/enemy_${t}.png`));
                
                // 生肖子弹与道具
                ['rat', 'ox', 'tiger', 'rabbit', 'dragon', 'snake', 'horse', 'goat', 'monkey', 'rooster', 'dog', 'pig'].forEach(z => {
                    AssetManager.add(`bullet_${z}`, `assets/bullets/bullet_${z}.png`);
                });
                ['bullet', 'health', 'wingman', 'zodiac'].forEach(t => AssetManager.add(`item_${t}`, `assets/items/item_[type].png`));
                
                // Boss 多阶段图片
                const constellations = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];
                constellations.forEach(name => {
                    for(let i=1; i<=12; i++) AssetManager.add(`boss_${name}_phase${i}`, `assets/bosses/${name}/${name}_phase${i}.png`);
                });
                
                AssetManager.loadAll().then(() => log("资源就绪"));
            } catch(e) { log("配置加载失败"); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await load();
            bind('show-select-btn', () => { showScreen('zodiac-select'); renderList(); });
            bind('show-settings-btn', () => showScreen('game-settings'));
            bind('start-btn', () => startGame(true));
            bind('restart-btn', () => startGame(true));
            bind('back-to-start-btn', () => showScreen('start-screen'));
            bind('save-settings-btn', () => showScreen('start-screen'));
            bind('confirm-select-btn', () => showScreen('start-screen'));
            bind('automation-test-btn', () => { log("仿真启动..."); window.runAutoTest(); });
            bind('submit-feedback-btn', () => { log("建议已收录"); document.getElementById('feedback-input').value = ''; });
            document.querySelectorAll('.setting-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const t = btn.dataset.type, v = parseFloat(btn.dataset.val);
                    document.querySelectorAll(`.setting-btn[data-type="${t}"]`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if(t === 'diff') State.diff = v; if(t === 'speed') State.speed = v;
                });
            });
            window.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); State.playerTargetX = (e.clientX - rect.left) * (400 / rect.width); });
            window.addEventListener('keydown', e => { if (e.code === 'Space') triggerUltimate(); });
            canvas.addEventListener('mousedown', () => { if (State.ultimateEnergy >= State.maxUltimateEnergy) triggerUltimate(); });
            initStars(); updateHUD();
        });

        let gameLoopId = null;
        function startGame(isNew) {
            if(isNew) { 
                State.score = 0; State.level = 0; State.lives = 3; State.bulletLevel = 1; 
                State.wingmen = []; State.ultimateEnergy = 0; 
                State.unlockedZodiacs = ['rat']; State.weapon = 'rat';
            }
            State.gameActive = true; State.bullets = []; State.enemies = []; State.powerups = []; State.boss = null; State.frameCount = 0; State.startTime = Date.now();
            showScreen('none'); document.getElementById('ultimate-bar').style.display = "block";
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = requestAnimationFrame(loop);
        }

        function triggerUltimate() {
            if (State.ultimateEnergy < State.maxUltimateEnergy || State.isUltimateActive) return;
            State.isUltimateActive = true; State.ultimateEnergy = 0; log("释放大招！");
            const duration = 200; const startFrame = State.frameCount;
            const bCfg = Config.zodiac_bullets.find(b => b.id === State.weapon) || {color:'#ffd700', id: State.weapon};
            const ultInterval = setInterval(() => {
                if (State.frameCount - startFrame > duration) { State.isUltimateActive = false; clearInterval(ultInterval); return; }
                for(let i=0; i<360; i+=20) State.bullets.push(new Bullet(State.playerX, 520, bCfg, i, false));
            }, 100);
        }

        function loop() {
            if (!State.gameActive) return;
            try {
                State.frameCount++;
                
                // 清屏
                ctx.clearRect(0, 0, 400, 600);
                
                // 每60帧更新一次日志，减少DOM操作
                if (State.frameCount % 60 === 0) {
                    log(`战斗中 - 计时: ${Math.floor((Date.now()-State.startTime)/1000)}s`);
                    // 更新能量条
                    const ultFill = document.getElementById('ultimate-fill');
                    if (ultFill) {
                        const percent = (State.ultimateEnergy / State.maxUltimateEnergy) * 100;
                        ultFill.style.width = percent + "%";
                    }
                }
                
                // 绘制星星背景
                ctx.fillStyle = "#fff";
                State.stars.forEach(s => {
                    s.y += s.sp * State.speed;
                    if (s.y > 600) s.y = -10;
                    ctx.fillRect(s.x, s.y, 2, 2);
                });

                // 更新玩家位置
                State.playerX += (State.playerTargetX - State.playerX) * 0.2;
                
                // 绘制玩家
                if (State.playerHitFlash > 0) {
                    State.playerHitFlash--;
                    ctx.filter = "brightness(3)";
                }
                const bCfg = Config.zodiac_bullets.find(b => b.id === State.weapon) || {color:'#e0e0e0', id: State.weapon};
                if (!safeDrawImage(State.assets['player'], State.playerX-25, 500, 50, 50)) {
                    ctx.fillStyle = "#1a1a1e";
                    ctx.fillRect(State.playerX-20, 510, 40, 40);
                }
                ctx.filter = "none";

                // 更新和绘制僚机
                State.wingmen.forEach(w => {
                    w.update();
                    w.draw();
                    if (State.frameCount % 20 === 0) {
                        w.shoot();
                    }
                });

                // 生成敌人
                if (State.frameCount % Math.floor(60/State.speed) === 0 && !State.boss) {
                    const r = Math.random();
                    if(r < 0.7) State.enemies.push(new Enemy('scout'));
                    else if(r < 0.9) State.enemies.push(new Enemy('shooter'));
                    else State.enemies.push(new Enemy('tank'));
                }
                if (State.frameCount % 1000 === 0 && !State.boss) {
                    State.enemies.push(new Enemy('elite'));
                }

                // 生成BOSS
                const elapsed = (Date.now() - State.startTime) / 1000;
                if (elapsed >= 30 && !State.boss) {
                    console.log(`尝试生成BOSS，时间: ${elapsed.toFixed(1)}s，关卡: ${State.level}`);
                    console.log(`关卡配置数量: ${Config.constellation_levels.length}`);
                    const bossCfg = Config.constellation_levels[State.level];
                    if (bossCfg) {
                        console.log(`找到BOSS配置: ${bossCfg.constellation}`);
                        State.boss = new Boss(bossCfg);
                        console.log(`BOSS生成成功: ${bossCfg.constellation}，生命值: ${State.boss.hp}`);
                        log(`BOSS已降临：${bossCfg.constellation}！`);
                    } else {
                        console.log(`未找到关卡配置，当前关卡: ${State.level}`);
                        log(`关卡配置数量: ${Config.constellation_levels.length}`);
                    }
                } else if (elapsed < 30) {
                    if (State.frameCount % 120 === 0) {
                        console.log(`等待BOSS生成，当前时间: ${elapsed.toFixed(1)}s`);
                    }
                }

                // 批量更新和绘制游戏对象
                const objects = [...State.bullets, ...State.enemies, ...State.powerups];
                for (let i = 0; i < objects.length; i++) {
                    objects[i].update();
                    objects[i].draw();
                }

                // 更新粒子
                for (let i = State.particles.length - 1; i >= 0; i--) {
                    const p = State.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    if (p.life <= 0) {
                        State.particles.splice(i, 1);
                    } else {
                        ctx.save();
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fill();
                        ctx.restore();
                    }
                }

                // 过滤掉超出边界的对象
                State.bullets = State.bullets.filter(b => !b.isDead && b.y > -50 && b.y < 650 && b.x > -50 && b.x < 450);
                State.enemies = State.enemies.filter(e => e.y < 650);
                State.powerups = State.powerups.filter(p => p.y < 650);

                // 处理BOSS
                if (State.boss) {
                    State.boss.update();
                    State.boss.draw();
                    document.getElementById('boss-hp-bar').style.display = "block";
                    document.getElementById('boss-hp-fill').style.width = (State.boss.hp / State.boss.maxHp * 100) + "%";
                } else {
                    document.getElementById('boss-hp-bar').style.display = "none";
                }

                // 碰撞检测优化
                const playerHitbox = { x: State.playerX, y: 520, radius: 25 };
                
                // 玩家子弹与敌人碰撞
                for (let i = State.bullets.length - 1; i >= 0; i--) {
                    const b = State.bullets[i];
                    if (!b.isEnemy && !b.isDead) {
                        let damage = (b.cfg.damage || 1) * (1 + (State.bulletLevel-1)*0.2) * (1 + State.level*0.15);
                        
                        // 生肖特性：暴击 (Tiger, Monkey)
                        if ((b.cfg.id === 'tiger' || b.cfg.id === 'monkey') && Math.random() < 0.25) {
                            damage *= 2;
                        }
                        // 生肖特性：距离增伤 (Tiger)
                        if (b.cfg.id === 'tiger') {
                            damage *= (1 + b.lifeTime * 0.01);
                        }

                        // 检测与敌人碰撞
                        for (let j = State.enemies.length - 1; j >= 0; j--) {
                            const e = State.enemies[j];
                            if (Math.hypot(b.x - e.x, b.y - e.y) < 35) {
                                e.hp -= damage;
                                e.hitFlash = 5;
                                
                                // 生肖特性：击退 (Ox)
                                if (b.cfg.id === 'ox') {
                                    e.y -= 30;
                                }
                                
                                // 生肖特性：吸血/治疗 (Goat)
                                if (b.cfg.id === 'goat' && Math.random() < 0.08) {
                                    State.lives = Math.min(State.lives + 1, 5);
                                    updateHUD();
                                    log("灵羊治愈！");
                                }

                                // 生肖特性：穿透 (Dragon, Rabbit)
                                if (b.cfg.id === 'dragon') {
                                    // 龙息穿透一切，不计次数
                                } else if (b.cfg.id === 'rabbit') {
                                    if (b.pierceCount < 3) {
                                        b.pierceCount++;
                                    } else {
                                        b.isDead = true;
                                    }
                                } else {
                                    b.isDead = true;
                                }

                                if (e.hp <= 0) {
                                    // 生肖特性：爆炸 (Pig)
                                    if (b.cfg.id === 'pig') {
                                        createExplosion(e.x, e.y, "#e91e63");
                                        // 爆炸伤害
                                        for (let k = 0; k < State.enemies.length; k++) {
                                            const o = State.enemies[k];
                                            if (Math.hypot(o.x - e.x, o.y - e.y) < 150) {
                                                o.hp -= damage * 0.8;
                                                o.hitFlash = 5;
                                            }
                                        }
                                    }
                                    
                                    // 掉落逻辑
                                    if (e.type === 'elite' || (State.level === 0 && Math.random() < 0.3)) {
                                        // 第一关特供：30% 概率掉落当前或下一个生肖道具，让玩家提前体验
                                        const nextZodiac = Config.constellation_levels[State.level + 1]?.unlock_bullet || State.weapon;
                                        const zodiacToDrop = (State.level === 0 && Math.random() < 0.5) ? 'ox' : nextZodiac;
                                        State.powerups.push(new Powerup(e.x, e.y, 'zodiac', zodiacToDrop));
                                    } else {
                                        const r = Math.random();
                                        if (r < 0.05) {
                                            State.powerups.push(new Powerup(e.x, e.y, 'health'));
                                        } else if (r < 0.15) {
                                            State.powerups.push(new Powerup(e.x, e.y, 'wingman'));
                                        } else if (r < 0.25) {
                                            State.powerups.push(new Powerup(e.x, e.y, 'bullet'));
                                        }
                                    }
                                    
                                    State.enemies.splice(j, 1);
                                    State.ultimateEnergy = Math.min(State.ultimateEnergy + (e.type === 'elite' ? 30 : 10), State.maxUltimateEnergy);
                                    State.score += (e.type === 'elite' ? 100 : 10);
                                    updateHUD();
                                }
                            }
                        }

                        // 检测与BOSS碰撞
                        if (State.boss && Math.hypot(b.x - State.boss.x, b.y - State.boss.y) < 80) {
                            // 确保BOSS完全进入屏幕后才开始受攻击
                            if (State.boss.y >= 0) {
                                State.boss.hp -= damage;
                                State.boss.hitFlash = 5;
                                if (b.cfg.id !== 'dragon' && b.cfg.id !== 'rabbit') {
                                    b.isDead = true;
                                }
                                if (State.boss.hp <= 0) {
                                    createExplosion(State.boss.x, State.boss.y, "#ffd700", 50);
                                    
                                    // 解锁新生肖逻辑
                                    const currentLevelCfg = Config.constellation_levels[State.level];
                                    const nextLevelCfg = Config.constellation_levels[State.level + 1];
                                    if (nextLevelCfg && nextLevelCfg.unlock_bullet) {
                                        const newZodiac = nextLevelCfg.unlock_bullet;
                                        if (!State.unlockedZodiacs.includes(newZodiac)) {
                                            State.unlockedZodiacs.push(newZodiac);
                                            State.weapon = newZodiac; // 自动切换到新解锁的生肖
                                            log(`解锁新生肖灵力：${newZodiac}！已自动切换。`);
                                        }
                                    }

                                    State.boss = null;
                                    State.level++;
                                    State.score += 500;
                                    State.startTime = Date.now(); // 重置计时器
                                    log("秘境净化！");
                                    updateHUD();
                                }
                            }
                        }
                    } else if (b.isEnemy && !b.isDead) {
                        // 敌方子弹与玩家碰撞
                        if (Math.hypot(b.x - playerHitbox.x, b.y - playerHitbox.y) < playerHitbox.radius) {
                            b.isDead = true;
                            State.lives--;
                            State.playerHitFlash = 10;
                            updateHUD();
                            if (State.lives <= 0) {
                                endGame();
                            }
                        }
                        // 生肖特性：拦截 (Rat)
                        if (State.weapon === 'rat') {
                            for (let j = 0; j < State.bullets.length; j++) {
                                const pb = State.bullets[j];
                                if (!pb.isEnemy && !pb.isDead && Math.hypot(b.x - pb.x, b.y - pb.y) < 30) {
                                    b.isDead = true;
                                    pb.isDead = true;
                                    createExplosion(b.x, b.y, "#fff", 5);
                                }
                            }
                        }
                    }
                }

                // 敌人与玩家碰撞
                for (let i = State.enemies.length - 1; i >= 0; i--) {
                    const e = State.enemies[i];
                    if (Math.hypot(e.x - playerHitbox.x, e.y - playerHitbox.y) < 30) {
                        State.enemies.splice(i, 1);
                        State.lives--;
                        State.playerHitFlash = 10;
                        updateHUD();
                        if (State.lives <= 0) {
                            endGame();
                        }
                    }
                }

                // 道具拾取
                for (let i = State.powerups.length - 1; i >= 0; i--) {
                    const p = State.powerups[i];
                    if (Math.hypot(p.x - playerHitbox.x, p.y - playerHitbox.y) < 30) {
                        if (p.type === 'bullet') {
                            State.bulletLevel = Math.min(State.bulletLevel + 1, 5);
                        } else if (p.type === 'health') {
                            State.lives = Math.min(State.lives + 1, 5);
                        } else if (p.type === 'wingman') {
                            if (State.wingmen.length < 2) {
                                State.wingmen.push(new Wingman(State.wingmen.length === 0 ? -1 : 1));
                            }
                        } else if (p.type === 'zodiac') {
                            State.weapon = p.zodiacId;
                            if (!State.unlockedZodiacs.includes(p.zodiacId)) {
                                State.unlockedZodiacs.push(p.zodiacId);
                                log(`拾取灵珠：解锁新生肖 ${p.zodiacId}！`);
                            }
                        }
                        State.powerups.splice(i, 1);
                        updateHUD();
                    }
                }

                // 玩家射击
                const fireRate = bCfg.fire_rate || 10;
                if (State.frameCount % Math.floor(fireRate / State.speed) === 0) {
                    const count = Math.min(State.bulletLevel, 5);
                    const totalSpread = (count - 1) * 12;
                    for (let i = 0; i < count; i++) {
                        const angle = -90 - totalSpread/2 + (count > 1 ? (i * totalSpread/(count-1)) : 0);
                        State.bullets.push(new Bullet(State.playerX, 500, bCfg, angle, false));
                    }
                }
                
                // 继续游戏循环
                gameLoopId = requestAnimationFrame(loop);
            } catch (err) {
                console.error('Game loop error:', err);
                State.gameActive = false;
            }
        }

        function endGame() { State.gameActive = false; document.getElementById('game-over').classList.remove('hidden'); document.getElementById('final-score-display').innerText = `得分: ${State.score}`; }
        function updateHUD() { document.getElementById('score').innerText = `得分: ${State.score}`; document.getElementById('life').innerText = `❤️x${State.lives}`; const lv = Config.constellation_levels[State.level]; document.getElementById('level-name').innerText = lv ? lv.constellation : "终焉秘境"; }
        function renderList() {
            const list = document.getElementById('zodiac-list'); list.innerHTML = '';
            const icons = { rat: '🐀', ox: '🐂', tiger: '🐅', rabbit: '🐇', dragon: '🐉', snake: '🐍', horse: '🐎', goat: '🐐', monkey: '🐒', rooster: '🐓', dog: '🐕', pig: '🐖' };
            State.unlockedZodiacs.forEach(zId => {
                const item = document.createElement('div'); item.className = `zodiac-item ${State.weapon === zId ? 'selected' : ''}`;
                item.innerHTML = `<div class="zodiac-icon">${icons[zId]}</div><div style="font-size:10px;">${zId}</div>`;
                item.onclick = () => { State.weapon = zId; document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('selected')); item.classList.add('selected'); };
                list.appendChild(item);
            });
        }
        function initStars() { State.stars = Array.from({length:50}, () => ({ x: Math.random()*400, y: Math.random()*600, sp: Math.random()*2+1 })); }

        window.runAutoTest = function() {
            startGame(true); 
            State.lives = 99; // 测试模式给予超多生命
            
            log("仿真启动：正在模拟真人操作...");

            const simulationLoop = setInterval(() => {
                if (!State.gameActive) {
                    clearInterval(simulationLoop);
                    return;
                }

                // --- 真人操作模拟算法 (Autopilot v2.0) ---
                
                // 1. 危险感知：躲避子弹
                let nearestDanger = null;
                let minDist = 120; // 危险警戒半径
                
                State.bullets.filter(b => b.isEnemy).forEach(b => {
                    let d = Math.hypot(b.x - State.playerX, b.y - 520);
                    if (d < minDist) {
                        minDist = d;
                        nearestDanger = b;
                    }
                });

                if (nearestDanger) {
                    // 如果子弹在左边，向右闪；反之亦然
                    let escapeDir = nearestDanger.x < State.playerX ? 40 : -40;
                    State.playerTargetX = Math.max(20, Math.min(380, State.playerX + escapeDir));
                    return; // 优先级最高：生存
                }

                // 2. 收益驱动：吃道具
                let nearestPowerup = null;
                let minItemDist = 300;
                State.powerups.forEach(p => {
                    let d = Math.hypot(p.x - State.playerX, p.y - 520);
                    if (d < minItemDist) {
                        minItemDist = d;
                        nearestPowerup = p;
                    }
                });

                if (nearestPowerup) {
                    State.playerTargetX = nearestPowerup.x;
                    return; // 优先级第二：成长
                }

                // 3. 进攻本能：主动对准敌人
                let targetEnemy = null;
                if (State.boss) {
                    targetEnemy = State.boss;
                } else if (State.enemies.length > 0) {
                    // 优先对准血量最少或最靠近底部的敌机
                    targetEnemy = State.enemies.sort((a, b) => b.y - a.y)[0];
                }

                if (targetEnemy) {
                    // 增加一点拟人化的延迟抖动，不完美对齐
                    let jitter = (Math.random() - 0.5) * 10;
                    State.playerTargetX = Math.max(20, Math.min(380, targetEnemy.x + jitter));
                } else {
                    // 闲时回归中心
                    State.playerTargetX += (200 - State.playerX) * 0.05;
                }

                // 4. 自动大招
                if (State.ultimateEnergy >= State.maxUltimateEnergy) {
                    triggerUltimate();
                }

            }, 50); // 20Hz 的决策频率，模拟人类反应时间
        };
    </script>
