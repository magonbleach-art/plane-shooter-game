<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际战机 - 2026 专家进化版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: #050505;
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.3);
            border: 2px solid rgba(0, 150, 255, 0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* 统一的高级感 UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        h1 {
            color: #00d2ff;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        button {
            width: 220px;
            height: 50px;
            margin: 10px 0;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            pointer-events: none;
            z-index: 50;
        }

        /* 移动端摇杆/按键 */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            display: none;
        }

        .v-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            pointer-events: auto;
            touch-action: none;
        }

        .v-btn:active {
            background: rgba(0, 210, 255, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="score">得分: 0</div>
            <div id="life">生命: ❤️❤️❤️</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="overlay">
            <h1>星际战机</h1>
            <p style="color: #aaa; margin-bottom: 30px;">2026 马年航天版</p>
            <button id="start-btn">开始跃迁</button>
            <button class="secondary-btn" onclick="showFeedback()">评价建议</button>
        </div>

        <div id="game-over" class="overlay hidden">
            <h1 style="color: #ff4b2b;">任务失败</h1>
            <p id="final-score">最终得分: 0</p>
            <button id="restart-btn">再次出击</button>
            <button class="secondary-btn" onclick="showFeedback()">评价建议</button>
        </div>
    </div>

    <script>
        // 核心进化：配置驱动架构
        let gameConfig = {
            settings: {
                PLAYER_SPEED: 5,
                INITIAL_LIVES: 3,
                BULLET_SPEED: 10,
                BULLET_INTERVAL: 200,
                ENEMY_SPAWN_RATE: 0.03,
                ENEMY_SPEED_MIN: 2,
                ENEMY_SPEED_MAX: 5,
                ACTIVE_BULLET: "normal"
            },
            ui: {
                theme_color: "#00d2ff"
            },
            bullet_types: [
                { id: "normal", color: "#00d2ff", width: 4, height: 15, damage: 1 }
            ]
        };

        // 模拟热加载
        async function loadConfig() {
            try {
                const response = await fetch('game_config.json?t=' + Date.now());
                if (response.ok) {
                    const newConfig = await response.json();
                    // 深度合并配置，防止丢失前端特有逻辑
                    gameConfig.settings = { ...gameConfig.settings, ...newConfig.settings };
                    gameConfig.ui = { ...gameConfig.ui, ...newConfig.ui };
                    gameConfig.bullet_types = newConfig.bullet_types || gameConfig.bullet_types;
                    gameConfig.version = newConfig.version;
                    console.log("✅ 已同步最新专家配置: v" + gameConfig.version);
                }
            } catch(e) {
                console.warn("无法连接到配置服务器，使用本地默认配置");
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let player = { x: 200, y: 500, size: 30, speed: 5 };
        let bullets = [];
        let enemies = [];
        let stars = [];

        // 初始化背景星空
        for(let i=0; i<50; i++) {
            stars.push({ x: Math.random()*400, y: Math.random()*600, s: Math.random()*2 });
        }

        // 键盘监听
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // 移动端拖拽支持
        container.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            player.targetX = touch.clientX - rect.left;
        });
        container.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            player.targetX = touch.clientX - rect.left;
            e.preventDefault();
        }, { passive: false });

        class Bullet {
            constructor(x, y, angle = 0, type = null) {
                this.x = x; 
                this.y = y; 
                this.angle = angle * Math.PI / 180;
                this.type = type || gameConfig.bullet_types.find(t => t.id === gameConfig.settings.ACTIVE_BULLET) || gameConfig.bullet_types[0];
                this.speed = gameConfig.settings.BULLET_SPEED;
            }
            update() { 
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed; 
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.type.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.type.color;
                
                if (this.type.id === "laser") {
                    ctx.fillRect(-this.type.width/2, -600, this.type.width, 600); // 激光束贯穿全屏
                } else {
                    ctx.fillRect(-(this.type.width || 4)/2, 0, this.type.width || 4, this.type.height || 15);
                }
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -50;
                this.speed = gameConfig.settings.ENEMY_SPEED_MIN + Math.random() * (gameConfig.settings.ENEMY_SPEED_MAX - gameConfig.settings.ENEMY_SPEED_MIN);
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.save();
                ctx.fillStyle = '#ff4b2b';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff4b2b';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - 15, this.y - 30);
                ctx.lineTo(this.x + 15, this.y - 30);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function shoot() {
            const type = gameConfig.bullet_types.find(t => t.id === gameConfig.settings.ACTIVE_BULLET) || gameConfig.bullet_types[0];
            if (type.id === "spread") {
                const count = type.count || 3;
                const step = type.angle / (count - 1);
                for (let i = 0; i < count; i++) {
                    bullets.push(new Bullet(player.x, player.y, -type.angle/2 + i * step, type));
                }
            } else {
                bullets.push(new Bullet(player.x, player.y, 0, type));
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制星空
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.y += 1;
                if(s.y > 600) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // 玩家移动逻辑
            if (keys['ArrowLeft'] && player.x > 20) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - 20) player.x += player.speed;
            if (player.targetX !== undefined) {
                player.x += (player.targetX - player.x) * 0.2;
            }

            if (Date.now() % gameConfig.settings.BULLET_INTERVAL < 20) shoot();
            
            if (Math.random() < gameConfig.settings.ENEMY_SPAWN_RATE) enemies.push(new Enemy());
            
            // 绘制玩家 (马里奥航天员)
            ctx.save();
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = gameConfig.ui.theme_color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f00';
            ctx.fillRect(player.x - 10, player.y - 20, 20, 8); // 红色航天帽
            ctx.restore();

            // 子弹更新与绘制 (倒序安全删除)
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                bullets[i].draw();
                if (bullets[i].y < -600 || bullets[i].y > 1200) bullets.splice(i, 1);
            }

            // 敌人更新与绘制 (双重循环碰撞检测，倒序安全删除)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update();
                e.draw();

                // 检测子弹碰撞
                let hit = false;
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.abs(b.x - e.x) < 25 && b.y < e.y && b.y > e.y - 40) {
                        if (b.type.id !== "laser") bullets.splice(j, 1); // 激光不消失
                        hit = true;
                        break;
                    }
                }

                if (hit) {
                    enemies.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = `得分: ${score}`;
                    continue;
                }

                // 检测玩家碰撞
                if (Math.abs(e.x - player.x) < 25 && Math.abs(e.y - player.y) < 25) {
                    enemies.splice(i, 1);
                    lives--;
                    updateLife();
                    if (lives <= 0) endGame();
                    continue;
                }

                if (e.y > canvas.height + 50) enemies.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        function updateLife() {
            document.getElementById('life').textContent = '生命: ' + '❤️'.repeat(lives);
        }

        function startGame() {
            loadConfig();
            gameActive = true;
            score = 0; lives = gameConfig.settings.INITIAL_LIVES;
            bullets = []; enemies = [];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            updateLife();
            gameLoop();
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score').textContent = `最终得分: ${score}`;
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;

        function showFeedback() {
            alert("专家评审团(PM/策划/美术/技术)已就位，请直接在手机提交建议，我们将自动评估并热更新游戏！");
        }
    </script>
</body>
</html>
