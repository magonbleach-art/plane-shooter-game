<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生肖射手：十二星座秘境</title>
    <script src="zodiac_designs.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { position: relative; width: 400px; height: 600px; background: #050505; box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; display: flex; flex-direction: column; }
        /* PC 端缩放适配 */
        @media (min-height: 700px) and (min-width: 500px) {
            #game-container { transform: scale(1.1); }
        }
        @media (max-height: 600px) {
            #game-container { transform: scale(0.8); }
        }
        canvas { display: block; width: 400px; height: 600px; cursor: crosshair; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 0; box-sizing: border-box; backdrop-filter: blur(10px); }
        .overlay-content { width: 90%; display: flex; flex-direction: column; align-items: center; text-align: center; max-height: 95%; overflow-y: auto; padding: 10px 0; }
        /* 隐藏滚动条但保留功能 */
        .overlay-content::-webkit-scrollbar { width: 0; background: transparent; }
        
        .hidden { display: none !important; }
        h1 { color: #ffd700; font-size: 1.8rem; margin: 0 0 10px 0; text-align: center; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); font-weight: 800; letter-spacing: 1px; }
        .tutorial { color: #aaa; font-size: 0.8rem; line-height: 1.4; text-align: center; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.1); width: 100%; box-sizing: border-box; }
        .tutorial b { color: #ffd700; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        
        .btn-group { width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 8px; }
        button { width: 100%; height: 44px; margin: 0; background: linear-gradient(135deg, #ffd700, #b8860b); border: none; border-radius: 22px; color: #000; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
        
        #show-settings-btn { background: #444; color: #ffd700; border: 1px solid #ffd700; }
        #show-select-btn { background: #222; color: #fff; border: 1px solid #444; }
        #start-btn { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; height: 50px; font-size: 1.1rem; margin-top: 5px; }

        .feedback-area { width: 100%; max-width: 280px; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; padding-top: 15px; border-top: 1px solid rgba(255,215,0,0.1); }
        .feedback-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.2); border-radius: 10px; color: #fff; padding: 10px; font-size: 0.85rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        #submit-feedback-btn { background: #ffd700; color: #000; font-size: 0.85rem; height: 36px; border-radius: 18px; box-shadow: none; }
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; font-size: 1rem; pointer-events: none; z-index: 50; color: #ffd700; font-weight: bold; text-shadow: 0 0 5px #000; }
        #ai-status { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #0f0; text-transform: uppercase; letter-spacing: 2px; display: none; z-index: 50; animation: blink 1s infinite; }
        #qa-log { position: absolute; bottom: 80px; left: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 10px; padding: 5px; border-radius: 4px; pointer-events: none; max-height: 100px; overflow: hidden; z-index: 50; border-left: 2px solid #0f0; display: none; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #boss-info { position: absolute; top: 50px; left: 60px; right: 60px; text-align: center; z-index: 50; }
        #boss-countdown { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #boss-hp-bar { height: 8px; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.5); border-radius: 4px; display: none; overflow: hidden; }
        #boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff0000); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px #f00; }
        
        /* 大招能量条 */
        #ult-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; text-align: center; z-index: 50; }
        #ult-bar { height: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 5px; overflow: hidden; margin-bottom: 5px; }
        #ult-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 0.1s; box-shadow: 0 0 10px #ffd700; }
        #ult-btn { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,215,0,0.2); border: 2px solid #ffd700; color: #ffd700; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(255,215,0,0.3); position: absolute; bottom: 80px; right: 20px; transition: 0.3s; z-index: 100; }
        #ult-btn.ready { background: rgba(255,215,0,0.8); color: #000; box-shadow: 0 0 30px #ffd700; animation: pulse 1s infinite; display: flex; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #ult-info { font-size: 0.7rem; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div id="score">得分: 0</div>
            <div id="level-name">白羊宫</div>
            <div id="life">❤️x3</div>
        </div>
        <div id="ai-status">AI 自动驾驶激活</div>
        <div id="qa-log"></div>
        <div id="boss-info">
            <div id="boss-countdown">Boss 降临倒计时: 30s</div>
            <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
        </div>
        <div id="ult-container">
            <div id="ult-bar"><div id="ult-fill"></div></div>
            <div id="ult-info">觉醒能量</div>
        </div>
        <div id="ult-btn">觉醒</div>
        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="overlay">
            <div class="overlay-content">
                <h1>生肖射手<br>十二星座秘境</h1>
                <div class="tutorial">
                    <b>秘境法则</b>
                    1. 挑战<b>十二星座</b>宫殿，净化黑暗之力<br>
                    2. 收集掉落的<b>生肖灵珠</b>切换子弹形态<br>
                    3. 击败最终 Boss 解锁下一关及新子弹
                </div>
                <button id="show-select-btn">选择生肖开局</button>
                <button id="show-settings-btn" style="background: #607d8b; color: #fff;">游戏设置 (难度/速度)</button>
                <button id="start-btn" style="background: #4caf50; color: #fff;">直接开启秘境</button>
                <div class="feedback-area">
                    <input type="text" id="feedback-input" class="feedback-input" placeholder="输入进化建议 (由 AI 专家评审)">
                    <button id="submit-feedback-btn">提交进化建议</button>
                </div>
            </div>
        </div>

        <div id="zodiac-select" class="overlay hidden">
             <div class="overlay-content">
                 <h1>选择开局生肖</h1>
                 <div id="zodiac-list" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; width: 100%;">
                     <!-- 动态生成已解锁的生肖按钮 -->
                 </div>
                 <button id="confirm-select-btn">确认并开始</button>
                 <button id="back-to-start-btn" style="background: #666; color: #fff;">返回</button>
             </div>
         </div>
 
         <div id="game-settings" class="overlay hidden">
             <div class="overlay-content">
                 <h1>游戏配置</h1>
                 
                 <div class="setting-group" style="margin-bottom: 20px; width: 100%;">
                     <h3 style="color: #ffd700; margin-bottom: 10px;">敌方血量 (难度)</h3>
                     <div id="difficulty-options" style="display: flex; gap: 10px; justify-content: center;">
                         <button class="setting-btn" data-type="diff" data-val="0.5" style="flex:1; height: 40px; font-size: 0.9rem;">简单 (x0.5)</button>
                         <button class="setting-btn active" data-type="diff" data-val="1.0" style="flex:1; height: 40px; font-size: 0.9rem; background: #ffd700;">普通 (x1.0)</button>
                         <button class="setting-btn" data-type="diff" data-val="2.0" style="flex:1; height: 40px; font-size: 0.9rem;">困难 (x2.0)</button>
                     </div>
                 </div>

                 <div class="setting-group" style="margin-bottom: 30px; width: 100%;">
                     <h3 style="color: #ffd700; margin-bottom: 10px;">游戏速度 (1-5 档)</h3>
                     <div id="speed-options" style="display: flex; gap: 8px; justify-content: center;">
                         <button class="setting-btn" data-type="speed" data-val="0.6" style="width: 45px; height: 45px;">1</button>
                         <button class="setting-btn" data-type="speed" data-val="0.8" style="width: 45px; height: 45px;">2</button>
                         <button class="setting-btn active" data-type="speed" data-val="1.0" style="width: 45px; height: 45px; background: #ffd700;">3</button>
                         <button class="setting-btn" data-type="speed" data-val="1.2" style="width: 45px; height: 45px;">4</button>
                         <button class="setting-btn" data-type="speed" data-val="1.5" style="width: 45px; height: 45px;">5</button>
                     </div>
                 </div>

                 <div class="setting-group" style="margin-bottom: 30px; width: 100%;">
                     <h3 style="color: #ffd700; margin-bottom: 10px;">AI 辅助 (看我打游戏)</h3>
                     <button id="ai-toggle-btn" style="background: #444; color: #ffd700; border: 1px solid #ffd700; height: 44px; border-radius: 22px;">开启 AI 自动驾驶</button>
                 </div>

                 <button id="save-settings-btn">保存并返回</button>
             </div>
         </div>

        <div id="game-over" class="overlay hidden">
            <div class="overlay-content">
                <h1 style="color: #ff4b2b;">灵力枯竭</h1>
                <p style="color: #aaa; margin-bottom: 20px;">你的意志已消散在星空之中...</p>
                <button id="restart-btn">再次挑战</button>
            </div>
        </div>

        <div id="level-clear" class="overlay hidden">
            <div class="overlay-content">
                <h1 style="color: #00ff00;">宫殿净化成功!</h1>
                <p id="unlock-msg" style="color: #ffd700; font-size: 1.2rem; margin-bottom: 25px;">解锁新生肖之力: 鼠</p>
                <button id="next-level-btn">进入下一宫</button>
            </div>
        </div>
    </div>

    <script>
        let gameConfig = { settings: {}, zodiac_bullets: [], constellation_levels: [] };
        async function loadConfig() {
            const res = await fetch('game_config.json?t=' + Date.now());
            gameConfig = await res.json();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        let gameActive = false, score = 0, lives = 2, frameCount = 0; // 初始血量改为 2
        let currentLevelIdx = 0, activeBulletId = 'rat', bulletLevel = 1;
        let player = { x: 200, y: 520, targetX: 200, width: 50, height: 50, hasWingman: false }; // 增加侧翼状态
        let bullets = [], enemies = [], stars = [], particles = [], powerups = [], boss = null;
        let bossSpawnTime = 1800; 
        let hpPacksSpawned = 0;
        let screenShake = 0;
        let unlockedZodiacs = ['rat']; // 初始解锁鼠
        let currentLevelZodiacs = []; // 当前关卡掉落的 5 个随机生肖
        let selectedStartWeapon = 'rat'; // 选中的开局武器
        let difficultyMult = 1.0; // 难度系数
        let gameSpeedMult = 1.0; // 速度系数
        let autopilotEnabled = false; // AI 自动驾驶
        
        // 觉醒系统变量
        let ultEnergy = 0;
        let ultActive = false;
        let ultTimer = 0;
        let isInvincible = false;
        let screenFlash = 0;

        for(let i=0; i<50; i++) stars.push({ x: Math.random()*400, y: Math.random()*600, s: Math.random()*2+1 });

        // 双端适配的输入监听
        const getCanvasX = (clientX) => {
            const rect = canvas.getBoundingClientRect();
            return (clientX - rect.left) * (canvas.width / rect.width);
        };
        window.addEventListener('mousemove', e => player.targetX = getCanvasX(e.clientX));
        window.addEventListener('touchmove', e => { 
            player.targetX = getCanvasX(e.touches[0].clientX); 
            e.preventDefault(); 
        }, {passive:false});

        // PC 键盘支持
        window.addEventListener('keydown', e => {
            const step = 20;
            if (e.key === 'ArrowLeft' || e.key === 'a') player.targetX -= step;
            if (e.key === 'ArrowRight' || e.key === 'd') player.targetX += step;
            if (e.key === ' ' || e.key === 'Enter') triggerUltimate();
            if (e.key === 'v' || e.key === 'V') document.getElementById('ai-toggle-btn').click();
            if (e.key === 'Escape') {
                if (!gameActive) {
                    location.reload(); // 在结束或结算界面按 Esc 返回主界面
                }
            }
        });
        document.getElementById('ult-btn').onclick = triggerUltimate;

        function triggerUltimate() {
            if (ultEnergy < 100 || ultActive || !gameActive) return;
            
            const design = ZODIAC_DESIGNS[activeBulletId];
            if (!design) return;

            ultEnergy = 0;
            ultActive = true;
            ultTimer = 300; // 5秒
            screenFlash = 20;
            
            // 动态调用 zodiac_designs.js 中的大招触发逻辑
            if (design.ultimate && design.ultimate.trigger) {
                design.ultimate.trigger({
                    player, bullets, enemies, boss, 
                    screenShake: (s) => screenShake = s,
                    screenFlash: (s) => screenFlash = s,
                    lives: (l) => lives = l,
                    isInvincible: (v) => isInvincible = v
                });
            }

            document.getElementById('ult-info').innerText = design.ultimate.name + " 觉醒!";
            document.getElementById('ult-btn').classList.remove('ready');
        }

        function updateUlt() {
            if (!ultActive) {
                if (ultEnergy < 100) {
                    ultEnergy += 0.05 + (bulletLevel * 0.02); // 随等级充能加快
                    if (ultEnergy >= 100) {
                        ultEnergy = 100;
                        document.getElementById('ult-btn').classList.add('ready');
                        document.getElementById('ult-info').innerText = "觉醒就绪 (Space)";
                    }
                }
            } else {
                ultTimer--;
                
                // 持续性大招逻辑
                if (activeBulletId === 'dragon' && ultTimer % 5 === 0) {
                    // 龙大招：扫射激光
                    const bCfg = gameConfig.zodiac_bullets.find(b => b.id === 'dragon');
                    for(let i=0; i<3; i++) {
                        let angle = -90 + Math.sin(frameCount * 0.1 + i) * 60;
                        bullets.push(new Bullet(player.x, player.y, bCfg, angle, false, 3));
                    }
                }
                
                if (activeBulletId === 'snake' && ultTimer % 30 === 0) {
                    // 蛇大招：全屏毒雾视觉+伤害
                    createExplosion(Math.random()*400, Math.random()*600, "#4caf50", 2);
                    enemies.concat(boss ? [boss] : []).forEach(e => e.hp -= 1);
                }

                if (activeBulletId === 'monkey' && ultTimer % 15 === 0) {
                    // 猴大招：分身同步射击
                    const bCfg = gameConfig.zodiac_bullets.find(b => b.id === 'monkey');
                    [[-60, 20], [60, 20], [-120, 50], [120, 50]].forEach(pos => {
                        bullets.push(new Bullet(player.x + pos[0], player.y + pos[1], bCfg, -90, false, 1));
                    });
                }

                if (ultTimer <= 0) {
                    ultActive = false;
                    isInvincible = false;
                    document.getElementById('ult-info').innerText = "能量充盈中...";
                    // 恢复速度
                    enemies.forEach(e => e.speed = 2);
                    if(boss) boss.speed = 1;
                }
            }
            document.getElementById('ult-fill').style.width = ultEnergy + "%";
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 绘制侧翼机枪
            if (player.hasWingman) {
                ctx.fillStyle = "#aaa";
                ctx.fillRect(-45, 10, 10, 20); // 左侧翼
                ctx.fillRect(35, 10, 10, 20);  // 右侧翼
                ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
                ctx.fillStyle = "#0ff";
                ctx.fillRect(-42, 5, 4, 5);
                ctx.fillRect(38, 5, 4, 5);
            }
            
            // 基础光晕 (随等级增强)
            const bCfg = gameConfig.zodiac_bullets.find(b => b.id === activeBulletId) || {color: '#ffd700'};
            ctx.shadowBlur = 10 + bulletLevel * 10 + (ultActive ? 30 : 0);
            ctx.shadowColor = bCfg.color;
            
            if (ultActive) {
                // 觉醒状态下的额外视觉
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(0, 0, 35 + Math.sin(frameCount*0.2)*5, 0, Math.PI*2); ctx.stroke();
            }
            
            // 绘制等级指示器 (小星点)
            for(let i=0; i<bulletLevel; i++) {
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(-15 + i*15, 25, 3, 0, Math.PI*2);
                ctx.fill();
            }

            // 根据不同子弹类型变形
            if (activeBulletId === 'rat') { // 鼠：网状防御
                ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 2;
                ctx.beginPath(); for(let i=0; i<8; i++) { ctx.moveTo(0,0); ctx.lineTo(Math.cos(i*Math.PI/4)*25, Math.sin(i*Math.PI/4)*25); }
                ctx.stroke();
            } else if (activeBulletId === 'ox') { // 牛：重装
                ctx.fillStyle = "#8d6e63"; ctx.fillRect(-20, -20, 40, 40); ctx.fillRect(-10, -30, 20, 10);
            } else if (activeBulletId === 'tiger') { // 虎：霸气
                ctx.fillStyle = "#ff9800"; ctx.beginPath(); ctx.moveTo(0, -30); ctx.lineTo(-25, 20); ctx.lineTo(25, 20); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#000"; ctx.fillRect(-15, -5, 30, 2);
            } else if (activeBulletId === 'dragon') { // 龙：金光
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 30; ctx.shadowColor = "#ffd700";
            } else if (activeBulletId === 'horse') { // 马：流线
                ctx.fillStyle = "#2196f3"; ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(-15, 15); ctx.lineTo(15, 15); ctx.closePath(); ctx.fill();
            } else { // 其他默认形态
                ctx.fillStyle = bCfg.color; ctx.beginPath(); ctx.moveTo(0, -30); ctx.lineTo(-25, 15); ctx.lineTo(25, 15); ctx.closePath(); ctx.fill();
            }
            
            // 引擎喷火
            if (gameActive) {
                ctx.fillStyle = "#f44336";
                ctx.beginPath();
                ctx.moveTo(-10, 15); ctx.lineTo(0, 15 + Math.random()*20); ctx.lineTo(10, 15);
                ctx.fill();
            }
            ctx.restore();
        }

        class Bullet {
            constructor(x, y, cfg, angle = -90, isEnemy = false, level = 1) {
                this.x = x; this.y = y; this.cfg = cfg;
                this.isEnemy = isEnemy;
                this.level = level;
                this.angle = angle * Math.PI / 180;
                
                // 敌方子弹基础速度已在 Enemy 中处理，玩家子弹受 gameSpeedMult 影响
                const baseSpeed = isEnemy ? (cfg.speed || 4.5) : (gameConfig.settings.BULLET_SPEED || 12);
                this.speed = baseSpeed * (cfg.speed_mult || 1);
                if (!isEnemy) this.speed *= gameSpeedMult;
                
                this.isHoming = cfg.homing || (cfg.type === "homing_dog");
                this.damage = (cfg.damage || 1) * (isEnemy ? 1 : level);
                this.bounces = cfg.bounces || 0;
                this.poison_dot = cfg.poison_dot || 0;
                this.stun_dur = cfg.stun_dur || 0;
                this.history = []; // 用于 S 形弹道
                
                // 敌方子弹加大，更易观察
                this.width = isEnemy ? 12 : (cfg.width || 8);
                this.height = isEnemy ? 12 : (cfg.height || 20);
            }
            update() {
                // 蛇·曲行毒弹: S形弹道
                if (this.cfg.type === "snake_poison") {
                    this.angle += Math.sin(frameCount * 0.2) * 0.1;
                }
                
                // 狗·忠魂追踪弹 / 龙·贯日激光 (追踪部分)
                if (this.isHoming && !this.isEnemy) {
                    let target = null, minDist = 1500; // 扩大追踪范围
                    enemies.concat(boss ? [boss] : []).forEach(e => {
                        let d = Math.hypot(e.x - this.x, e.y - this.y);
                        if (d < minDist) { minDist = d; target = e; }
                    });
                    if (target) {
                        let targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
                        let diff = targetAngle - this.angle;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        // 显著增强追踪灵敏度 (从 0.15 提升到 0.25 或根据配置)
                        const hSpeed = (this.cfg.homing_speed || 0.2) * (1 + this.level * 0.1);
                        this.angle += diff * hSpeed;
                    }
                }
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 反弹逻辑 (兔 / 猴)
                if (this.bounces > 0) {
                    if (this.x < 0 || this.x > 400) {
                        this.angle = Math.PI - this.angle;
                        this.bounces--;
                        if (this.cfg.random_angle) this.angle += (Math.random() - 0.5) * 1;
                    }
                }

                // 鼠·天罗网弹: 拦截敌弹逻辑 (通用拦截)
                if (this.cfg.id === 'rat') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        if (eb.isEnemy && Math.hypot(eb.x - this.x, eb.y - this.y) < 40) {
                            bullets.splice(j, 1);
                            createExplosion(eb.x, eb.y, "#fff", 0.2);
                        }
                    }
                }

                // 虎/马: 清除白羊大招或其他弹幕
                if (this.cfg.id === 'tiger' || this.cfg.id === 'horse') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        if (eb.isEnemy && Math.hypot(eb.x - this.x, eb.y - this.y) < 30) {
                            bullets.splice(j, 1);
                        }
                    }
                }

                // 兔: 摧毁金牛重力弹
                if (this.cfg.id === 'rabbit') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        if (eb.isEnemy && eb.cfg.speed_mult < 0.5 && Math.hypot(eb.x - this.x, eb.y - this.y) < 30) {
                            bullets.splice(j, 1);
                        }
                    }
                }

                // 狗: 摧毁双子/处女小弹
                if (this.cfg.id === 'dog') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        if (eb.isEnemy && Math.hypot(eb.x - this.x, eb.y - this.y) < 30) {
                            bullets.splice(j, 1);
                        }
                    }
                }

                // 龙: 贯穿清除 (如巨蟹大招)
                if (this.cfg.id === 'dragon') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        // 简化：激光路径上的敌弹都消失
                        if (eb.isEnemy && Math.abs(eb.x - this.x) < 20) {
                            bullets.splice(j, 1);
                        }
                    }
                }

                // 猴: 反弹并清除 (如射手流星/摩羯石弹)
                if (this.cfg.id === 'monkey') {
                    for(let j = bullets.length - 1; j >= 0; j--) {
                        let eb = bullets[j];
                        if (eb.isEnemy && Math.hypot(eb.x - this.x, eb.y - this.y) < 30) {
                            bullets.splice(j, 1);
                        }
                    }
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                
                // 动态调用 zodiac_designs.js 中的攻击特效
                const design = ZODIAC_DESIGNS[this.cfg.id];
                if (!this.isEnemy && design && design.attack_effect) {
                    ctx.shadowBlur = 10 + this.level * 5;
                    ctx.shadowColor = design.color;
                    design.attack_effect(ctx, this);
                } else {
                    // 默认敌弹或通用渲染
                    ctx.fillStyle = this.isEnemy ? "#ff4b2b" : (this.cfg.color || "#ffd700");
                    ctx.shadowBlur = 10 + (this.isEnemy ? 0 : this.level * 5);
                    ctx.shadowColor = ctx.fillStyle;
                    
                    if (this.cfg.type === "laser_dragon") {
                        let w = 8 + (this.level * 8);
                        ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                        ctx.fillRect(-w/2, -600, w, 600);
                    } else {
                        ctx.rotate(this.angle + Math.PI/2);
                        ctx.beginPath(); 
                        let sw = 3 + (this.isEnemy ? 0 : this.level);
                        let sh = 8 + (this.isEnemy ? 0 : this.level * 2);
                        ctx.ellipse(0, 0, sw, sh, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        class PowerUp {
            constructor(x, y, forceType = null) {
                const types = [
                    { id: 'rat', color: '#e0e0e0', label: '鼠' },
                    { id: 'ox', color: '#8d6e63', label: '牛' },
                    { id: 'tiger', color: '#ff9800', label: '虎' },
                    { id: 'rabbit', color: '#f06292', label: '兔' },
                    { id: 'dragon', color: '#ffd700', label: '龙' },
                    { id: 'snake', color: '#4caf50', label: '蛇' },
                    { id: 'horse', color: '#2196f3', label: '马' },
                    { id: 'goat', color: '#ffffff', label: '羊' },
                    { id: 'monkey', color: '#ffeb3b', label: '猴' },
                    { id: 'rooster', color: '#f44336', label: '鸡' },
                    { id: 'dog', color: '#ffc107', label: '狗' },

                // 视觉优化：黑色背景圆 + 对应颜色文字 (避免全白看不清)
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = this.info.color; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.info.label, this.x, this.y + 5); ctx.restore();

        class Enemy {
            constructor(type = 'scout') {
                this.x = Math.random()*360 + 20; this.y = -30;
                this.type = type;
                
                // 怪物类型配置
                const enemyTypes = {
                    scout: { hp: 1.5, speed: 2, score: 10, shape: 'triangle', color: '#ff4b2b', canShoot: true, fireInterval: 100 },
                    tank: { hp: 8, speed: 1.2, score: 30, shape: 'rect', color: '#8d6e63', canShoot: false },
                    stinger: { hp: 2.5, speed: 3.5, score: 20, shape: 'diamond', color: '#f44336', canShoot: true, fireInterval: 80 }
                };
                
                const cfg = enemyTypes[type] || enemyTypes.scout;
                const hpMult = gameConfig.settings.ENEMY_HP_MULT || 1;
                
                // 动态血量：基础HP * 难度系数 * 关卡加成 (从 0.5 降至 0.3 避免后期太肉)
                this.hp = cfg.hp * hpMult * (1 + currentLevelIdx * 0.3) * difficultyMult;
                this.maxHp = this.hp;
                this.speed = cfg.speed * gameSpeedMult;
                this.score = cfg.score;
                this.shape = cfg.shape;
                this.color = cfg.color;
                this.canShoot = cfg.canShoot;
                
                // 动态射击频率：基础间隔 / 游戏速度 / 关卡难度
                this.fireInterval = (cfg.fireInterval || 120) / (gameSpeedMult * (1 + currentLevelIdx * 0.1));
                this.fireTimer = Math.random() * this.fireInterval;
            }
            update() { 
                this.y += this.speed; 
                if (this.canShoot) {
                    this.fireTimer++;
                    if (this.fireTimer >= this.fireInterval) {
                        // 敌方子弹速度随游戏速度和关卡提升
                        const bSpeed = 4.5 * gameSpeedMult * (1 + currentLevelIdx * 0.05);
                        bullets.push(new Bullet(this.x, this.y, { color: this.color, speed: bSpeed }, 90, true));
                        this.fireTimer = 0;
                    }
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                
                if (this.shape === 'triangle') {
                    ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-15, -15); ctx.lineTo(15, -15); ctx.closePath();
                } else if (this.shape === 'rect') {
                    ctx.fillRect(-20, -20, 40, 40);
                } else if (this.shape === 'diamond') {
                    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(15, 0); ctx.lineTo(0, 20); ctx.lineTo(-15, 0); ctx.closePath();
                }
                ctx.fill();
                
                // 绘制血条 (如果血量大于 1)
                if (this.maxHp > 1) {
                    ctx.fillStyle = "rgba(255,255,255,0.3)";
                    ctx.fillRect(-20, -30, 40, 4);
                    ctx.fillStyle = "#f00";
                    ctx.fillRect(-20, -30, 40 * (this.hp / this.maxHp), 4);
                }
                ctx.restore();
            }
        }

        class Boss {
            constructor(cfg) {
                this.cfg = cfg; 
                // 动态 Boss HP：随关卡深度增加，但幅度放缓 (从固定倍率改为指数增长)
                const baseHp = cfg.hp || 500;
                this.hp = baseHp * (1 + currentLevelIdx * 0.4) * (difficultyMult || 1); 
                this.maxHp = this.hp;
                this.x = 200; this.y = -100; this.targetY = 120;
                this.skillTimer = 0;
                this.isPhase2 = false;
            }
            update() {
                if (this.y < this.targetY) {
                    this.y += 1;
                    return;
                }
                
                this.x += Math.sin(frameCount * 0.02) * 2;
                this.skillTimer++;

                // 检查是否进入二阶段 (血量 <= 30%)
                if (!this.isPhase2 && (this.hp / this.maxHp) <= 0.3) {
                    this.isPhase2 = true;
                    this.skillTimer = 0; // 重置计时器触发大招
                }

                if (this.isPhase2) {
                    this.executeBigSkill();
                } else {
                    this.executeSmallSkill();
                }
            }

            executeSmallSkill() {
                const interval = 120 / gameSpeedMult;
                if (this.skillTimer % Math.floor(interval) === 0) {
                    const skill = this.cfg.small_skill;
                    switch(skill) {
                        case 'straight_bullet': // 白羊: 直线单发
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#ff4b2b", type: "standard" }, 90, true));
                            break;
                        case 'gravity_bullet': // 金牛: 慢速重力弹
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#8d6e63", speed_mult: 0.3 }, 90, true));
                            break;
                        case 'cross_bullets': // 双子: 左右交叉弹
                            bullets.push(new Bullet(this.x - 20, this.y + 40, { color: "#ffeb3b" }, 110, true));
                            bullets.push(new Bullet(this.x + 20, this.y + 40, { color: "#ffeb3b" }, 70, true));
                            break;
                        case 'wave_push': // 巨蟹: 横向推浪 (不扣血)
                            // 逻辑在碰撞检测中处理
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#00bcd4", type: "wave" }, 90, true));
                            break;
                        case 'fan_scatter': // 狮子: 扇形散弹
                            for(let i=-2; i<=2; i++) bullets.push(new Bullet(this.x, this.y + 40, { color: "#ff9800" }, 90 + i*20, true));
                            break;
                        case 'homing_seed': // 处女: 跟踪小弹
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#9c27b0", homing: true, homing_speed: 0.05 }, 90, true));
                            break;
                        case 'balance_shot': // 天秤: 左右交替
                            let side = Math.sin(frameCount * 0.1) > 0 ? -30 : 30;
                            bullets.push(new Bullet(this.x + side, this.y + 40, { color: "#ffc107" }, 90, true));
                            break;
                        case 'poison_dart': // 天蝎: 毒弹直线
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#4caf50", type: "poison" }, 90, true));
                            break;
                        case 'meteor_arrow': // 射手: 流星斜向
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#ff5722" }, 60 + Math.random()*60, true));
                            break;
                        case 'bounce_rock': // 摩羯: 反弹石弹
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#795548", bounces: 2 }, 80 + Math.random()*20, true));
                            break;
                        case 'tornado_wind': // 水瓶: 龙卷位移
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "#2196f3", type: "wind" }, 90, true));
                            break;
                        case 'ghost_bubble': // 双鱼: 隐形弹
                            bullets.push(new Bullet(this.x, this.y + 40, { color: "rgba(255,255,255,0.2)", type: "ghost" }, 90, true));
                            break;
                    }
                }
            }

            executeBigSkill() {
                const interval = 180 / gameSpeedMult;
                if (this.skillTimer % Math.floor(interval) === 0) {
                    const skill = this.cfg.big_skill;
                    switch(skill) {
                        case 'parallel_rows': // 白羊: 三列平行
                            [-60, 0, 60].forEach(ox => bullets.push(new Bullet(this.x + ox, this.y + 40, { color: "#ff4b2b" }, 90, true)));
                            break;
                        case 'falling_barrage': // 金牛: 全屏落弹
                            for(let i=0; i<5; i++) bullets.push(new Bullet(Math.random()*400, 0, { color: "#8d6e63" }, 90, true));
                            break;
                        case 'dual_lasers': // 双子: 双向激光
                            bullets.push(new Bullet(this.x - 50, this.y, { color: "#ffeb3b", type: "boss_laser" }, 90, true));
                            bullets.push(new Bullet(this.x + 50, this.y, { color: "#ffeb3b", type: "boss_laser" }, 90, true));
                            break;
                        case 'arc_shield': // 巨蟹: 弧形包围
                            for(let i=0; i<10; i++) bullets.push(new Bullet(this.x, this.y, { color: "#00bcd4" }, 45 + i*10, true));
                            break;
                        case 'center_explosion': // 狮子: 中央爆破
                            createExplosion(200, 300, "#ff9800", 3);
                            // 伤害由碰撞逻辑处理
                            break;
                        case 'cross_laser': // 处女: 十字激光
                            bullets.push(new Bullet(this.x, 0, { color: "#9c27b0", type: "boss_laser_v" }, 90, true));
                            bullets.push(new Bullet(0, this.y, { color: "#9c27b0", type: "boss_laser_h" }, 0, true));
                            break;
                        case 'double_beams': // 天秤: 双束激光
                            bullets.push(new Bullet(this.x - 30, this.y, { color: "#ffc107", type: "boss_laser" }, 90, true));
                            bullets.push(new Bullet(this.x + 30, this.y, { color: "#ffc107", type: "boss_laser" }, 90, true));
                            break;
                        case 'blackhole_pull': // 天蝎: 黑洞牵引
                            player.targetX = this.x; // 强制拉人
                            break;
                        case 'star_lock': // 射手: 星象锁定
                            bullets.push(new Bullet(this.x, this.y, { color: "#ff5722", homing: true, speed_mult: 0.5 }, 90, true));
                            break;
                        case 'screen_rubble': // 摩羯: 全屏碎石
                            for(let i=0; i<8; i++) bullets.push(new Bullet(Math.random()*400, -20, { color: "#795548" }, 90, true));
                            break;
                        case 'ice_beams': // 水瓶: 2条横向
                            bullets.push(new Bullet(0, 200, { color: "#2196f3", type: "boss_laser_h" }, 0, true));
                            bullets.push(new Bullet(0, 400, { color: "#2196f3", type: "boss_laser_h" }, 0, true));
                            break;
                        case 'ring_expansion': // 双鱼: 环形扩散
                            for(let i=0; i<12; i++) bullets.push(new Bullet(this.x, this.y, { color: "#e91e63" }, i*30, true));
                            break;
                    }
                }
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = this.isPhase2 ? "#f00" : "#333"; 
                ctx.shadowBlur = this.isPhase2 ? 50 : 20; 
                ctx.shadowColor = this.isPhase2 ? "#f00" : "#ffd700";
                
                // 绘制不同形状代表不同星座BOSS (简化处理，用颜色和装饰区分)
                ctx.beginPath();
                ctx.moveTo(0, 40); ctx.lineTo(-40, -20); ctx.lineTo(40, -20);
                ctx.closePath(); ctx.fill();
                
                // 核心点
                ctx.fillStyle = this.isPhase2 ? "#fff" : "#ff0";
                ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();
            }
        }

        function createExplosion(x, y, color, size = 1) {
            for(let i=0; i<20*size; i++) particles.push({ 
                x, y, vx: (Math.random()-0.5)*12*size, vy: (Math.random()-0.5)*12*size, life: 1, color 
            });
            screenShake = 10 * size;
        }

        function logQA(msg) {
            const logEl = document.getElementById('qa-log');
            if (!logEl) return;
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const newLog = document.createElement('div');
            newLog.innerHTML = `<span style="color:#888">[${time}]</span> [QA-Agent] ${msg}`;
            logEl.prepend(newLog);
            if (logEl.children.length > 5) logEl.removeChild(logEl.lastChild);
        }

        function updateAutopilot() {
            if (frameCount % 60 === 0) {
                // QA 状态检查
                if (boss) {
                    const hpPercent = (boss.hp / boss.maxHp * 100).toFixed(1);
                    logQA(`正在压制 Boss: ${boss.cfg.name} (HP: ${hpPercent}%)`);
                    if (hpPercent > 95 && frameCount > 2000) logQA("⚠️ 警报: Boss 掉血过慢，建议增强子弹威力");
                } else {
                    const enemyCount = enemies.length;
                    if (enemyCount > 8) logQA(`⚠️ 警告: 敌机堆积 (${enemyCount})，火力可能不足`);
                }
            }

            // 1. 避弹逻辑：扫描 150 像素范围内的敌弹
            let dangerousBullet = null;
            let minDist = 150;
            bullets.forEach(b => {
                if (b.isEnemy && b.y < player.y && b.y > player.y - 200) {
                    let dist = Math.abs(b.x - player.x);
                    if (dist < 60) {
                        dangerousBullet = b;
                    }
                }
            });

            if (dangerousBullet) {
                // 逃离危险子弹
                player.targetX = dangerousBullet.x > player.x ? player.x - 40 : player.x + 40;
                return;
            }

            // 2. 拾取道具：如果道具在附近，去捡它
            let nearestPowerup = null;
            let minPUdist = 200;
            powerups.forEach(p => {
                let d = Math.hypot(p.x - player.x, p.y - player.y);
                if (d < minPUdist) {
                    minPUdist = d;
                    nearestPowerup = p;
                }
            });

            if (nearestPowerup) {
                player.targetX = nearestPowerup.x;
                return;
            }

            // 3. 进攻逻辑：对准 Boss 或最近的敌人
            let target = boss || null;
            if (!target) {
                let minEdist = 1000;
                enemies.forEach(e => {
                    if (e.y < player.y) {
                        let d = Math.hypot(e.x - player.x, e.y - player.y);
                        if (d < minEdist) {
                            minEdist = d;
                            target = e;
                        }
                    }
                });
            }

            if (target) {
                player.targetX = target.x;
            }

            // 4. 自动觉醒
            if (ultEnergy >= 100) {
                triggerUltimate();
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            
            // AI 自动驾驶逻辑
            if (autopilotEnabled) {
                updateAutopilot();
            }
            
            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }
            
            ctx.clearRect(0, 0, 400, 600); frameCount++;
            updateUlt();

            // 觉醒全屏闪光效果
            if (screenFlash > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${screenFlash/20})`;
                ctx.fillRect(0, 0, 400, 600);
                screenFlash--;
            }

            // 背景
            ctx.fillStyle = '#fff';
            stars.forEach(s => { s.y += 2; if(s.y > 600) s.y = -10; ctx.fillRect(s.x, s.y, s.s, s.s); });

            // 玩家
            player.x += (player.targetX - player.x) * 0.2;
            player.x = Math.max(30, Math.min(370, player.x));
            drawPlayer();

            // 道具投放 (血包)
            if (hpPacksSpawned < 2) {
                if (frameCount === 600 || frameCount === 1500) {
                    powerups.push(new PowerUp(Math.random()*300+50, -20, { id: 'hp', color: '#ff4b2b', label: '❤️' }));
                    hpPacksSpawned++;
                }
            }

            // Boss 逻辑
            const levelCfg = gameConfig.constellation_levels[currentLevelIdx];
            if (!boss && frameCount < bossSpawnTime) {
                let timeLeft = Math.max(0, Math.ceil((bossSpawnTime - frameCount) / 60));
                document.getElementById('boss-countdown').innerText = `Boss 降临倒计时: ${timeLeft}s`;
            } else if (!boss && frameCount >= bossSpawnTime) {
                boss = new Boss(levelCfg.boss);
                document.getElementById('boss-countdown').innerText = "WARNING: BOSS 出现!";
                document.getElementById('boss-hp-bar').style.display = "block";
            }

            if (boss) {
                boss.update(); boss.draw();
                document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
            }

            // 发射子弹
            if (frameCount % 12 === 0) {
                const bCfg = gameConfig.zodiac_bullets.find(b => b.id === activeBulletId);
                const fire = (x, y) => {
                    if (bCfg.type === "scatter_tiger") {
                        let count = bCfg.scatter + (bulletLevel - 1) * 2;
                        for(let i=0; i<count; i++) {
                            let angle = -90 - (bCfg.angle_spread/2) + (i * bCfg.angle_spread / (count - 1));
                            bullets.push(new Bullet(x, y - 20, bCfg, angle, false, bulletLevel));
                        }
                    } else {
                        bullets.push(new Bullet(x, y - 20, bCfg, -90, false, bulletLevel));
                    }
                };
                
                fire(player.x, player.y);
                if (player.hasWingman) {
                    fire(player.x - 40, player.y + 10);
                    fire(player.x + 40, player.y + 10);
                }
            }

            // 子弹逻辑
            for(let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.update(); b.draw();
                if (b.isEnemy) {
                    if (Math.abs(b.x - player.x) < 25 && Math.abs(b.y - player.y) < 25) {
                        // 特殊位移效果 (巨蟹推浪, 水瓶龙卷)
                        if (b.cfg.type === "wave" || b.cfg.type === "wind") {
                            if (activeBulletId !== 'goat' && !isInvincible) {
                                player.targetX += (b.x < player.x ? 50 : -50); // 位移
                            }
                            bullets.splice(i, 1);
                            return;
                        }

                        if (!isInvincible) {
                            bullets.splice(i, 1); 
                            lives--; 
                            player.hasWingman = false; // 掉血失去侧翼
                            updateHUD();
                            createExplosion(player.x, player.y, "#ff4b2b", 0.5);
                            if (lives <= 0) endGame();
                        } else {
                            // 无敌时拦截子弹
                            bullets.splice(i, 1);
                            createExplosion(b.x, b.y, "#fff", 0.1);
                        }
                    }
                } else {
                    enemies.forEach((e, ei) => {
                        if (Math.abs(b.x - e.x) < 25 && Math.abs(b.y - e.y) < 25) {
                            e.hp -= b.damage; 
                            
                            // 鸡·鸣啼眩弹: 眩晕逻辑
                            if (b.cfg.type === "stun_rooster") { e.speed = 0.5; setTimeout(() => e.speed = 2, b.cfg.stun_dur * 16); }
                            
                            // 猪·暴食爆破弹: 爆炸逻辑
                            if (b.cfg.type === "nuke_pig") {
                                createExplosion(e.x, e.y, b.cfg.color, 2);
                                enemies.forEach((e2) => {
                                    if (Math.hypot(e2.x - e.x, e2.y - e.y) < b.cfg.aoe) e2.hp -= b.damage;
                                });
                            }
                            
                            if (e.hp <= 0) {
                                enemies.splice(ei, 1); score += 10; updateHUD();
                                createExplosion(e.x, e.y, "#ff4b2b", 0.3);
                                if (Math.random() < 0.25) powerups.push(new PowerUp(e.x, e.y));
                            }
                            if (!b.cfg.pierce && b.cfg.type !== "laser_dragon" && b.cfg.type !== "interceptor") bullets.splice(i, 1);
                        }
                    });
                    if (boss && Math.abs(b.x - boss.x) < 60 && Math.abs(b.y - boss.y) < 40) {
                        boss.hp -= b.damage; 
                        if (b.cfg.type === "explosive") createExplosion(b.x, b.y, b.cfg.color, 1.5);
                        if (!b.cfg.pierce && b.cfg.type !== "laser") bullets.splice(i, 1);
                        if (boss.hp <= 0) {
                            score += 1000; boss = null;
                            document.getElementById('boss-hp-bar').style.display = "none";
                            levelClear();
                        }
                    }
                }
                if (b && (b.y < -100 || b.y > 700 || b.x < -100 || b.x > 500)) bullets.splice(i, 1);
            }

            // 粒子
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // 敌人逻辑
            if (frameCount % 60 === 0 && !boss) {
                const types = ['scout', 'tank', 'stinger'];
                const type = types[Math.floor(Math.random() * types.length)];
                enemies.push(new Enemy(type));
            }
            for(let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i]; e.update(); e.draw();
                if (Math.abs(e.x - player.x) < 35 && Math.abs(e.y - player.y) < 35) {
                    if (!isInvincible) {
                        enemies.splice(i, 1); 
                        lives--; 
                        player.hasWingman = false; // 撞击失去侧翼
                        updateHUD();
                        createExplosion(player.x, player.y, "#ff4b2b", 1);
                        if (lives <= 0) endGame();
                    } else {
                        // 无敌冲撞
                        e.hp -= 10;
                        createExplosion(e.x, e.y, "#fff", 0.5);
                        if (e.hp <= 0) { enemies.splice(i, 1); score += 10; updateHUD(); }
                    }
                }
                if (e.y > 650) enemies.splice(i, 1);
            }

            // 道具逻辑
            for(let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i]; p.update(); p.draw();
                if (Math.abs(p.x - player.x) < 40 && Math.abs(p.y - player.y) < 40) {
                    if (p.info.id === 'hp') { 
                        lives = Math.min(5, lives + 1); updateHUD(); 
                    } else if (p.info.id === 'wingman') {
                        player.hasWingman = true;
                    } else { 
                        if (activeBulletId === p.info.id) {
                            bulletLevel = Math.min(3, bulletLevel + 1); // 拾取相同类型升级
                        } else {
                            activeBulletId = p.info.id;
                            bulletLevel = 1; // 拾取不同类型重置等级
                        }
                    }
                    createExplosion(p.x, p.y, p.info.color, 0.5);
                    powerups.splice(i, 1);
                }
                if (p.y > 650) powerups.splice(i, 1);
            }
            
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score').innerText = `得分: ${score}`;
            document.getElementById('life').innerText = `❤️x${lives}`;
            const levelData = gameConfig.constellation_levels[currentLevelIdx];
            const bCfg = gameConfig.zodiac_bullets.find(b => b.id === activeBulletId);
            
            let bulletInfo = "";
            if (bCfg) {
                bulletInfo = `<br><span style="font-size: 0.7rem; color: ${bCfg.color}; opacity: 0.9;">
                    形态: ${bCfg.name.split('·')[1]} | 威力: ${(bCfg.damage * bulletLevel).toFixed(1)}
                </span>`;
            }

            document.getElementById('level-name').innerHTML = `第 ${currentLevelIdx + 1} 关: ${levelData ? levelData.constellation : '未知'} (Lv.${bulletLevel})${bulletInfo}`;
        }

        // 初始化每关随机生肖池
        function initLevelZodiacs() {
            const allZodiacs = Object.keys(ZODIAC_DESIGNS);
            // 随机选 5 个 (包含当前已解锁的)
            let pool = [...new Set([...unlockedZodiacs, ...allZodiacs])];
            currentLevelZodiacs = [];
            while(currentLevelZodiacs.length < 5 && pool.length > 0) {
                let idx = Math.floor(Math.random() * pool.length);
                currentLevelZodiacs.push(pool.splice(idx, 1)[0]);
            }
        }

        function startGame(isNewGame = true) {
            loadConfig().then(() => {
                gameActive = true;
                if (isNewGame) {
                    score = 0; 
                    currentLevelIdx = 0; 
                    activeBulletId = selectedStartWeapon || 'rat'; 
                    bulletLevel = 1;
                }
                lives = 2; frameCount = 0; hpPacksSpawned = 0;
                bullets = []; enemies = []; powerups = []; boss = null; particles = [];
                player.hasWingman = false;
                initLevelZodiacs();
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('zodiac-select').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('level-clear').classList.add('hidden');
                document.getElementById('boss-hp-bar').style.display = "none";
                updateHUD(); gameLoop();
            });
        }

        // UI 事件监听
        document.getElementById('show-settings-btn').onclick = () => {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-settings').classList.remove('hidden');
        };

        document.querySelectorAll('.setting-btn').forEach(btn => {
            btn.onclick = () => {
                const type = btn.dataset.type;
                const val = parseFloat(btn.dataset.val);
                document.querySelectorAll(`.setting-btn[data-type="${type}"]`).forEach(b => {
                    b.style.background = 'rgba(255,255,255,0.1)';
                });
                btn.style.background = '#ffd700';
                if (type === 'diff') difficultyMult = val;
                if (type === 'speed') gameSpeedMult = val;
            };
        });

        document.getElementById('save-settings-btn').onclick = () => {
            document.getElementById('game-settings').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        };

        document.getElementById('ai-toggle-btn').onclick = () => {
            autopilotEnabled = !autopilotEnabled;
            const btn = document.getElementById('ai-toggle-btn');
            const status = document.getElementById('ai-status');
            if (autopilotEnabled) {
                btn.innerText = "关闭 AI 自动驾驶";
                btn.style.background = "#ffd700";
                btn.style.color = "#000";
                status.style.display = "block";
                document.getElementById('qa-log').style.display = "block";
                logQA("启动自动化回归测试...");
            } else {
                btn.innerText = "开启 AI 自动驾驶";
                btn.style.background = "#444";
                btn.style.color = "#ffd700";
                status.style.display = "none";
                document.getElementById('qa-log').style.display = "none";
            }
        };

        document.getElementById('show-select-btn').onclick = () => {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('zodiac-select').classList.remove('hidden');
            const list = document.getElementById('zodiac-list');
            list.innerHTML = '';
            unlockedZodiacs.forEach(zId => {
                const z = ZODIAC_DESIGNS[zId];
                const btn = document.createElement('div');
                btn.style.cssText = `
                    background: rgba(255,255,255,0.1); border: 2px solid ${z.color}; 
                    padding: 10px; border-radius: 10px; cursor: pointer; text-align: center;
                    color: ${z.color}; font-weight: bold; transition: 0.3s;
                `;
                btn.innerText = z.name.split('·')[0];
                if (selectedStartWeapon === zId) btn.style.background = z.color + "44";
                btn.onclick = () => {
                    selectedStartWeapon = zId;
                    Array.from(list.children).forEach(c => c.style.background = 'rgba(255,255,255,0.1)');
                    btn.style.background = z.color + "44";
                };
                list.appendChild(btn);
            });
        };

        document.getElementById('back-to-start-btn').onclick = () => {
            document.getElementById('zodiac-select').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        };

        function levelClear() {
            gameActive = false;
            // 解锁下一个生肖 (如果有)
            const allIds = Object.keys(ZODIAC_DESIGNS);
            const currentIdx = allIds.indexOf(activeBulletId);
            const nextId = allIds[currentIdx + 1] || allIds[0];
            if (!unlockedZodiacs.includes(nextId)) {
                unlockedZodiacs.push(nextId);
                document.getElementById('unlock-msg').innerText = `解锁新生肖之力: ${ZODIAC_DESIGNS[nextId].name.split('·')[0]}`;
            } else {
                document.getElementById('unlock-msg').innerText = `宫殿净化成功!`;
            }
            document.getElementById('level-clear').classList.remove('hidden');
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = () => startGame(true);
        document.getElementById('restart-btn').onclick = () => startGame(true); // 死亡后重新开始
        document.getElementById('confirm-select-btn').onclick = () => startGame(true);
        
        document.getElementById('next-level-btn').onclick = () => {
            currentLevelIdx++;
            if (currentLevelIdx < gameConfig.constellation_levels.length) {
                startGame(false); // 启动下一关，不重置总得分和已选武器 (除非玩家想换)
            } else {
                alert("恭喜！您已净化所有宫殿！");
                location.reload();
            }
        };
        document.getElementById('submit-feedback-btn').onclick = async () => {
            const val = document.getElementById('feedback-input').value;
            if(!val) return;
            const btn = document.getElementById('submit-feedback-btn');
            btn.innerText = "🚀 正在发送至 AI 专家团...";
            btn.disabled = true;
            
            try {
                // 核心链路：将建议同步到 ntfy，触发 Trae 监听
                await fetch('https://ntfy.sh/trae_plane_shooter_jibin_2026', { 
                    method: 'POST', 
                    body: JSON.stringify({ suggest: val, from: 'Game_UI' }) 
                });
                
                alert("✨ 建议已同步至 Trae 指挥中心！\n请关注企业微信群，AI 专家团正在进行评审...");
                document.getElementById('feedback-input').value = '';
            } catch(e) {
                alert("❌ 同步失败，请检查网络。");
            } finally {
                btn.innerText = "提交进化建议";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
